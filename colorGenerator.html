/* Returns the ordered list of color groups and their slugs, built from currentSystem */
function getColorGroups() {
  const groups = [
    {
      group: 'semantic', label: 'Semantic',
      slugs: ['background','foreground','reverse',
              'translucent','translucent-subtle','translucent-reverse','translucent-reverse-subtle'],
    },
    {
      group: 'base', label: 'Base',
      slugs: ['base-minus-3','base-minus-2','base-minus-1','base','base-plus-1','base-plus-2','base-plus-3'],
    },
    { group: 'primary',   label: 'Primary',
      slugs: ['primary-lightest','primary-lighter','primary-light','primary','primary-dark','primary-darker','primary-darkest'] },
    { group: 'secondary', label: 'Secondary',
      slugs: ['secondary-lightest','secondary-lighter','secondary-light','secondary','secondary-dark','secondary-darker','secondary-darkest'] },
    { group: 'tertiary',  label: 'Tertiary',
      slugs: ['tertiary-lightest','tertiary-lighter','tertiary-light','tertiary','tertiary-dark','tertiary-darker','tertiary-darkest'] },
    { group: 'interactive', label: 'Interactive',
      slugs: ['interactive', 'interactive-reverse'] },
  ];
  // Extended palettes — only include ones that have data
  const extCount = parseInt(document.getElementById('extCount')?.value || '3');
  const extEnabled = document.getElementById('enableExtended')?.checked !== false;
  if (extEnabled) {
    for (let n = 1; n <= extCount; n++) {
      if (currentSystem.extended?.[n-1]?.length) {
        groups.push({
          group: `extended-${n}`, label: `Extended ${n}`,
          slugs: [`extended-${n}-lightest`,`extended-${n}-light`,`extended-${n}`,`extended-${n}-dark`,`extended-${n}-darkest`],
        });
      }
    }
  }
  return groups;
}

/* Resolve a { group, slug } to a hex/rgba string from currentSystem */
function resolveTypoColor(group, slug) {
  const s = currentSystem;
  if (!s) return '#808080';
  if (group === 'semantic') {
    // semantic keys are camelCase internally (translucentSubtle, etc.)
    const camelKey = slug.replace(/-([a-z])/g, (_, c) => c.toUpperCase());
    return s.semantic?.[camelKey] || s.semantic?.[slug] || '#808080';
  }
  if (group === 'base') {
    const map = {'base-minus-3':0,'base-minus-2':1,'base-minus-1':2,'base':3,'base-plus-1':4,'base-plus-2':5,'base-plus-3':6};
    const idx = map[slug];
    if (idx === undefined || !s.grays?.[idx]) return '#808080';
    const physicalIdx = darkMode ? (6 - idx) : idx;
    return s.grays[physicalIdx] || '#808080';
  }
  if (group === 'primary' || group === 'secondary' || group === 'tertiary') {
    const base = group;
    const suffixMap = {
      [`${base}-lightest`]:0,[`${base}-lighter`]:1,[`${base}-light`]:2,
      [base]:3,[`${base}-dark`]:4,[`${base}-darker`]:5,[`${base}-darkest`]:6,
    };
    const idx = suffixMap[slug];
    return (idx !== undefined && s[base]?.[idx]) ? s[base][idx] : '#808080';
  }
  if (group === 'interactive') {
    if (slug === 'interactive-reverse') return resolveUtil('interactiveReverse');
    return resolveUtil('interactive');
  }
  if (group.startsWith('extended-')) {
    const n = parseInt(group.split('-')[1]) - 1;
    const extMap = {
      [`extended-${n+1}-lightest`]:0,[`extended-${n+1}-light`]:1,[`extended-${n+1}`]:2,
      [`extended-${n+1}-dark`]:3,[`extended-${n+1}-darkest`]:4,
    };
    const idx = extMap[slug];
    return (idx !== undefined && s.extended?.[n]?.[idx]) ? s.extended[n][idx] : '#808080';
  }
  return '#808080';
}

/* Build one color-slot card: label + group select + slug select + color dot.
   stateObj defaults to typoColors; registry to typoSlotRegistry; onChangeCb to updateTypePreview. */
function buildColorSlot(roleKey, label, stateObj, registry, onChangeCb) {
  stateObj  = stateObj  || typoColors;
  registry  = registry  || typoSlotRegistry;
  onChangeCb = onChangeCb || updateTypePreview;
  const state = stateObj[roleKey];
  const groups = getColorGroups();

  const card = document.createElement('div');
  card.className = 'color-slot-card';
  const title = document.createElement('div');
  title.className = 'color-slot-title';
  title.textContent = label;
  card.appendChild(title);

  const row = document.createElement('div');
  row.className = 'color-slot-selects';

  const groupSel = document.createElement('select');
  groups.forEach(g => {
    const o = document.createElement('option');
    o.value = g.group; o.textContent = g.label;
    if (g.group === state.group) o.selected = true;
    groupSel.appendChild(o);
  });

  const slugSel = document.createElement('select');
  function rebuildSlugOptions() {
    slugSel.innerHTML = '';
    const grp = groups.find(g => g.group === groupSel.value);
    if (!grp) return;
    grp.slugs.forEach(s => {
      const o = document.createElement('option');
      o.value = s; o.textContent = s;
      if (s === state.slug) o.selected = true;
      slugSel.appendChild(o);
    });
  }
  rebuildSlugOptions();

  const dot = document.createElement('div');
  dot.className = 'color-dot';
  function refreshDot() {
    const hex = resolveTypoColor(groupSel.value, slugSel.value);
    dot.style.background = hex;
  }
  refreshDot();
  registry.push(refreshDot);

  groupSel.addEventListener('change', () => {
    state.group = groupSel.value;
    // Pick first slug of new group as default
    const grp = groups.find(g => g.group === groupSel.value);
    state.slug = grp ? grp.slugs[0] : '';
    rebuildSlugOptions();
    refreshDot();
    onChangeCb();
    scheduleURLUpdate();
  });
  slugSel.addEventListener('change', () => {
    state.slug = slugSel.value;
    refreshDot();
    onChangeCb();
    scheduleURLUpdate();
  });

  row.appendChild(groupSel);
  row.appendChild(slugSel);
  row.appendChild(dot);
  card.appendChild(row);
  return card;
}

/* ===========================
   GOOGLE FONTS LOADER
=========================== */

const _loadedGFonts = new Set();

function loadGoogleFont(name) {
  if (!name || _loadedGFonts.has(name)) return;
  _loadedGFonts.add(name);
  const link = document.createElement('link');
  link.rel  = 'stylesheet';
  link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(name)}:wght@100;200;300;400;500;600;700;800;900&display=swap`;
  document.head.appendChild(link);
}

// Returns the CSS font-family stack for a loaded Google Font name
function gFontFamily(name) {
  const generic = /serif|cursive|fantasy|mono/i.test(name) ? 'serif' : 'sans-serif';
  return `"${name}", ${generic}`;
}

// Given a raw input value, decide if it looks like a bare font name
// (not already a CSS stack) and attempt to load + return a clean family string.
// Returns null if the value already looks like a full stack.
function tryLoadGoogleFont(raw) {
  const val = raw.trim();
  if (!val) return null;
  // Already a stack (contains comma or CSS keywords like -apple-system)
  if (val.includes(',') || val.includes('-apple-system') || val.includes('system-ui')) return null;
  // Strip surrounding quotes if present
  const name = val.replace(/^["']|["']$/g, '').trim();
  loadGoogleFont(name);
  return gFontFamily(name);
}

/* ===========================
   WP-STYLE CLAMP CALCULATOR
=========================== */

function wpClamp(minPx, maxPx, minVw = 320, maxVw = 1400) {
  const minRem = +(minPx / 16).toFixed(4);
  const maxRem = +(maxPx / 16).toFixed(4);
  if (minPx === maxPx) return `${minRem}rem`;
  const slope = (maxRem - minRem) / (maxVw - minVw);
  const interceptRem = +(minRem - slope * minVw).toFixed(4);
  const slopeVw     = +(slope * 100).toFixed(4);
  const intPart = interceptRem >= 0
    ? `+ ${interceptRem}rem`
    : `- ${Math.abs(interceptRem)}rem`;
  return `clamp(${minRem}rem, ${slopeVw}vw ${intPart}, ${maxRem}rem)`;
}

function evalClampPx(minPx, maxPx, vwPx, minVw = 320, maxVw = 1400) {
  const slope  = (maxPx - minPx) / (maxVw - minVw);
  const result = minPx + slope * (vwPx - minVw);
  return Math.max(minPx, Math.min(maxPx, result));
}

// Resolve any palette slug to a live hex/rgba value
function resolveSlug(slug) {
  const s = currentSystem;
  const grayMap = {'base-minus-3':0,'base-minus-2':1,'base-minus-1':2,'base':3,'base-plus-1':4,'base-plus-2':5,'base-plus-3':6};
  if (slug in grayMap) {
    const physIdx = darkMode ? (6 - grayMap[slug]) : grayMap[slug];
    return s.grays?.[physIdx] || '#808080';
  }
  const primMap = {'primary-lightest':0,'primary-lighter':1,'primary-light':2,'primary':3,'primary-dark':4,'primary-darker':5,'primary-darkest':6};
  if (slug in primMap) return s.primary?.[primMap[slug]] || '#808080';
  const sem = s.semantic || {};
  if (slug === 'translucent')                return sem.translucent              || 'rgba(0,0,0,0.6)';
  if (slug === 'translucent-subtle')         return sem.translucentSubtle        || 'rgba(0,0,0,0.05)';
  if (slug === 'translucent-reverse')        return sem.translucentReverse       || 'rgba(255,255,255,0.75)';
  if (slug === 'translucent-reverse-subtle') return sem.translucentReverseSubtle || 'rgba(255,255,255,0.15)';
  if (slug === 'background') return sem.background || '#fafafa';
  if (slug === 'foreground') return sem.foreground || '#1f2020';
  if (slug === 'reverse')    return sem.reverse    || '#ffffff';
  return '#808080';
}

function exportThemeJSONWithTypo(includeColor, includeTypo, includeUtil) {
  if (includeColor && !includeTypo && !includeUtil) { exportThemeJSON(); return; }

  function colorValue(hex, isUswdsMode) {
    if (isUswdsMode) {
      const token = findToken(hex);
      if (token) return `var(--token--color--${token})`;
    }
    return hex || '#000000';
  }

  const palette = [];
  if (includeColor) {
    const primSlugs  = ["primary-lightest","primary-lighter","primary-light","primary","primary-dark","primary-darker","primary-darkest"];
    const primNames  = ["Primary Lightest","Primary Lighter","Primary Light","Primary","Primary Dark","Primary Darker","Primary Darkest"];
    (currentSystem.primary || []).forEach((c, i) => palette.push({ slug: primSlugs[i], color: colorValue(c, sectionState.primary.mode==="uswds"), name: primNames[i] }));
    const secSlugs   = ["secondary-lightest","secondary-lighter","secondary-light","secondary","secondary-dark","secondary-darker","secondary-darkest"];
    const secNames   = ["Secondary Lightest","Secondary Lighter","Secondary Light","Secondary","Secondary Dark","Secondary Darker","Secondary Darkest"];
    (currentSystem.secondary || []).forEach((c, i) => palette.push({ slug: secSlugs[i], color: colorValue(c, sectionState.secondary.mode==="uswds"), name: secNames[i] }));
    const terSlugs   = ["tertiary-lightest","tertiary-lighter","tertiary-light","tertiary","tertiary-dark","tertiary-darker","tertiary-darkest"];
    const terNames   = ["Tertiary Lightest","Tertiary Lighter","Tertiary Light","Tertiary","Tertiary Dark","Tertiary Darker","Tertiary Darkest"];
    (currentSystem.tertiary || []).forEach((c, i) => palette.push({ slug: terSlugs[i], color: colorValue(c, sectionState.tertiary.mode==="uswds"), name: terNames[i] }));
    if (document.getElementById("enableExtended").checked) {
      const count = parseInt(document.getElementById("extCount").value);
      for (let n = 1; n <= count; n++) {
        const idx = n - 1;
        const colors = currentSystem.extended[idx] || [];
        const isUswds = extState[idx].source === "uswds";
        const extSlugs = ["lightest","light","","dark","darkest"].map(s => s ? `extended-${n}-${s}` : `extended-${n}`);
        const extNames = TONE_NAMES_5.map(t => t === "Base" ? `Extended Palette ${n}` : `Extended Palette ${n} ${t}`);
        colors.forEach((c, i) => palette.push({ slug: extSlugs[i], color: colorValue(c, isUswds), name: extNames[i] }));
      }
    }
    const sem = currentSystem.semantic || {};
    palette.push({ slug: "background", color: colorValue(sem.background, sectionState.semantic.mode==="uswds"), name: "Background" });
    palette.push({ slug: "foreground", color: colorValue(sem.foreground,  sectionState.semantic.mode==="uswds"), name: "Foreground" });
    palette.push({ slug: "reverse",    color: colorValue(sem.reverse,     sectionState.semantic.mode==="uswds"), name: "Reverse (On Color/Image)" });
    const graySlugsLight = ["base-minus-3","base-minus-2","base-minus-1","base","base-plus-1","base-plus-2","base-plus-3"];
    const graySlugs = darkMode ? [...graySlugsLight].reverse() : graySlugsLight;
    (currentSystem.grays || []).forEach((c, i) => palette.push({ slug: graySlugs[i], color: colorValue(c, sectionState.gray.mode==="uswds"), name: ["Base Lightest","Base Lighter","Base Light","Base","Base Dark","Base Darker","Base Darkest"][i] }));
    const sem2 = currentSystem.semantic || {};
    palette.push({ slug: "translucent",                color: sem2.translucent              || TRANSLUCENT_DEFAULTS.translucent,              name: "Translucent" });
    palette.push({ slug: "translucent-subtle",         color: sem2.translucentSubtle        || TRANSLUCENT_DEFAULTS.translucentSubtle,        name: "Translucent Subtle" });
    palette.push({ slug: "translucent-reverse",        color: sem2.translucentReverse       || TRANSLUCENT_DEFAULTS.translucentReverse,       name: "Translucent Reverse" });
    palette.push({ slug: "translucent-reverse-subtle", color: sem2.translucentReverseSubtle || TRANSLUCENT_DEFAULTS.translucentReverseSubtle, name: "Translucent Reverse Subtle" });
  }

  const settings = {};
  if (includeColor && palette.length) {
    settings.color = {
      custom: false, customDuotone: false, customGradient: false,
      defaultDuotone: false, defaultPalette: false, defaultGradients: false,
      palette, duotone: [], gradients: []
    };
  }

  if (includeTypo) {
    // Deduplicate font families by actual font name; derive slug from name
    function extractFontName(family) {
      // Take the first token, strip quotes
      return family.split(',')[0].trim().replace(/^["']|["']$/g, '').trim();
    }
    function nameToSlug(name) {
      return name.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
    }
    const seenSlugs = new Set();
    const fontFamilies = [];
    Object.values(fontRoles).forEach(role => {
      const name = extractFontName(role.family);
      const slug = nameToSlug(name);
      if (!seenSlugs.has(slug)) {
        seenSlugs.add(slug);
        fontFamilies.push({ name, slug, fontFamily: role.family });
      }
    });

    const fontSizes = [...typoScale]
      .sort((a, b) => a.minPx - b.minPx)
      .map(size => ({
        name: size.label,
        slug: size.name,
        size: size.maxPx + 'px',
        fluid: { min: size.minPx + 'px', max: size.maxPx + 'px' },
      }));

    settings.typography = {
      fluid: true,
      fontFamilies,
      fontSizes,
    };

    const WEIGHT_NAMES_CUSTOM = { '100':'thin','200':'extra-light','300':'light','400':'regular','500':'medium','600':'semibold','700':'bold','800':'extra-bold','900':'black' };
    settings.custom = settings.custom || {};
    ['body', 'heading', 'subheading', 'interactive'].forEach(key => {
      const role = fontRoles[key];
      const famName = role.family.split(',')[0].trim().replace(/^["']|["']$/g, '').trim();
      const famSlug = famName.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
      settings.custom[key] = {
        typography: {
          fontFamily: `var(--wp--preset--font-family--${famSlug})`,
          fontWeight: `var(--theme--type--weight--${WEIGHT_NAMES_CUSTOM[role.weight] || role.weight})`,
        },
      };
    });
  }

  if (includeUtil) {
    if (!settings.custom) settings.custom = {};
    settings.custom.color = {
      interactive:                       `var(--wp--preset--color--${utilColors.interactive.slug})`,
      interactiveHover:                  `var(--wp--preset--color--${utilColors.interactiveHover.slug})`,
      interactiveActive:                 `var(--wp--preset--color--${utilColors.interactiveActive.slug})`,
      interactiveOutlineBackground:      `var(--wp--preset--color--${utilColors.interactiveOutlineBg.slug})`,
      interactiveReverse:                `var(--wp--preset--color--${utilColors.interactiveReverse.slug})`,
      interactiveReverseHover:           `var(--wp--preset--color--${utilColors.interactiveReverseHover.slug})`,
      interactiveReverseActive:          `var(--wp--preset--color--${utilColors.interactiveReverseActive.slug})`,
      interactiveReverseOutlineBackground: `var(--wp--preset--color--${utilColors.interactiveReverseOutlineBg.slug})`,
      uiBorder:    `var(--wp--preset--color--${utilColors.uiBorder.slug})`,
      tableBorder: `var(--wp--preset--color--${utilColors.tableBorder.slug})`,
      tableHeader: `var(--wp--preset--color--${utilColors.tableHeader.slug})`,
      tableStripe: `var(--wp--preset--color--${utilColors.tableStripe.slug})`,
    };
  }

  const styles = {};

  if (includeTypo) {
    function colorRef(group, slug) {
      if (group === 'interactive') return `var(--wp--custom--color--${slug})`;
      return `var(--wp--preset--color--${slug})`;
    }
    function famRef(family) {
      const name = family.split(',')[0].trim().replace(/^["']|["']$/g, '').trim();
      const slug = name.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
      return `var(--wp--preset--font-family--${slug})`;
    }
    function sizeRef(sizeName) {
      return `var(--wp--preset--font-size--${sizeName})`;
    }
    const WEIGHT_NAMES = { '100':'thin','200':'extra-light','300':'light','400':'regular','500':'medium','600':'semibold','700':'bold','800':'extra-bold','900':'black' };
    function weightRef(w) {
      return `var(--theme--type--weight--${WEIGHT_NAMES[w] || w})`;
    }

    function toKebab(s) {
      return s.replace(/([A-Z])/g, m => '-' + m.toLowerCase());
    }
    function customVar(role, prop) {
      return `var(--wp--custom--${role}--typography--${toKebab(prop)})`;
    }

    styles.typography = {
      fontFamily:  customVar('body', 'fontFamily'),
      fontSize:    sizeRef('normal'),
      fontWeight:  customVar('body', 'fontWeight'),
    };

    const headingDefs = [
      { el: 'h1', sizeName: 'xx-large',     famRole: 'heading',    wtRole: 'heading',    colorKey: 'h1Color' },
      { el: 'h2', sizeName: 'large',        famRole: 'heading',    wtRole: 'heading',    colorKey: 'h2Color' },
      { el: 'h3', sizeName: 'emphasis',     famRole: 'heading',    wtRole: 'subheading', colorKey: 'h3Color' },
      { el: 'h4', sizeName: 'intermediate', famRole: 'subheading', wtRole: 'subheading', colorKey: 'h4Color' },
      { el: 'h5', sizeName: 'normal',       famRole: 'subheading', wtRole: 'subheading', colorKey: 'h5Color' },
      { el: 'h6', sizeName: 'small',        famRole: 'subheading', wtRole: 'subheading', colorKey: 'h6Color' },
    ];

    styles.elements = {};
    headingDefs.forEach(({ el, sizeName, famRole, wtRole, colorKey }) => {
      const tc = typoColors[colorKey];
      styles.elements[el] = {
        color: { text: colorRef(tc.group, tc.slug) },
        typography: {
          fontFamily: customVar(famRole, 'fontFamily'),
          fontSize:   sizeRef(sizeName),
          fontWeight: customVar(wtRole,  'fontWeight'),
        },
      };
    });

    styles.elements.link = {
      color: { text: colorRef(typoColors.linkText.group, typoColors.linkText.slug) },
    };
  }

  const themeJson = {
    "$schema": "https://schemas.wp.org/trunk/theme.json",
    "version": 3,
    "settings": settings,
    ...(Object.keys(styles).length ? { styles } : {}),
  };

  const blob = new Blob([JSON.stringify(themeJson, null, "\t")], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = "theme.json"; a.click();
}

function exportCSSWithTypo(includeColor, includeTypo, includeUtil) {
  const lines = [":root {"];

  if (includeColor) {
    const t7 = ["lightest","lighter","light","base","dark","darker","darkest"];
    const t5 = ["lightest","light","base","dark","darkest"];
    function addVars(prefix, arr, names){
      if (!arr || !arr.length) return;
      arr.forEach((color, i) => {
        const suffix = names[i] === "base" ? "" : `-${names[i]}`;
        lines.push(`  --${prefix}${suffix}: ${color};`);
      });
    }
    lines.push("\n  /* Primary */");  addVars("color-primary",   currentSystem.primary,   t7);
    lines.push("\n  /* Secondary */"); addVars("color-secondary", currentSystem.secondary, t7);
    lines.push("\n  /* Tertiary */");  addVars("color-tertiary",  currentSystem.tertiary,  t7);
    lines.push("\n  /* Extended */");
    currentSystem.extended.forEach((colors, i) => {
      if (colors && colors.length){ lines.push(`\n  /* Extended Palette ${i+1} */`); addVars(`color-extended-${i+1}`, colors, t5); }
    });
    lines.push("\n  /* Semantic */");
    lines.push(`  --color-background: ${currentSystem.semantic.background};`);
    lines.push(`  --color-foreground: ${currentSystem.semantic.foreground};`);
    lines.push(`  --color-reverse:    ${currentSystem.semantic.reverse};`);
    lines.push("\n  /* Grays */");
    const graySlugsLight = ["base-minus-3","base-minus-2","base-minus-1","base","base-plus-1","base-plus-2","base-plus-3"];
    const graySlugs = darkMode ? [...graySlugsLight].reverse() : graySlugsLight;
    currentSystem.grays.forEach((color, i) => { lines.push(`  --color-${graySlugs[i]}: ${color};`); });
  }

  if (includeTypo) {
    lines.push("\n  /* Font Families */");
    Object.entries(fontRoles).forEach(([key, role]) => {
      lines.push(`  --font-family-${key}: ${role.family};`);
    });
    lines.push("\n  /* Font Weights */");
    Object.entries(fontRoles).forEach(([key, role]) => {
      lines.push(`  --font-weight-${key}: ${role.weight};`);
    });
    lines.push("\n  /* Fluid Type Scale */");
    typoScale.forEach(size => {
      lines.push(`  --font-size-${size.name}: ${wpClamp(size.minPx, size.maxPx)};`);
    });
  }

  if (includeUtil) {
    lines.push("\n  /* Utilities — Interactive */");
    lines.push(`  --color-interactive:                  ${resolveUtil('interactive')};`);
    lines.push(`  --color-interactive-hover:            ${resolveUtil('interactiveHover')};`);
    lines.push(`  --color-interactive-active:           ${resolveUtil('interactiveActive')};`);
    lines.push(`  --color-interactive-outline-bg:       ${resolveUtil('interactiveOutlineBg')};`);
    lines.push(`  --color-interactive-reverse:          ${resolveUtil('interactiveReverse')};`);
    lines.push(`  --color-interactive-reverse-hover:    ${resolveUtil('interactiveReverseHover')};`);
    lines.push(`  --color-interactive-reverse-active:   ${resolveUtil('interactiveReverseActive')};`);
    lines.push(`  --color-interactive-reverse-outline-bg: ${resolveUtil('interactiveReverseOutlineBg')};`);
    lines.push("\n  /* Utilities — UI & Table */");
    lines.push(`  --color-ui-border:    ${resolveUtil('uiBorder')};`);
    lines.push(`  --color-table-border: ${resolveUtil('tableBorder')};`);
    lines.push(`  --color-table-header: ${resolveUtil('tableHeader')};`);
    lines.push(`  --color-table-stripe: ${resolveUtil('tableStripe')};`);
  }

  lines.push("}");

  const blob = new Blob([lines.join("\n")], { type: "text/css" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = "token-system.css"; a.click();
}

function exportFigmaSVGWithTypo(includeColor, includeTypo, includeUtil) {
  if (includeColor && !includeTypo && !includeUtil) { exportFigmaSVG(); return; }

  // For SVG: export color SVG and/or a typography specimen SVG
  if (includeColor) exportFigmaSVG();
  if (includeUtil)  exportUtilitiesSVG();

  if (includeTypo) {
    const SW = 900, PAD = 32, GAP = 16, VW = 1400;
    const fgColor   = currentSystem.semantic?.foreground || '#1f2020';
    const bgColor   = currentSystem.semantic?.background || '#fafafa';
    const linkColor = resolveTypoColor(typoColors.linkText.group, typoColors.linkText.slug);

    const headFam  = fontRoles.heading.family;
    const headWt   = fontRoles.heading.weight;
    const subFam   = fontRoles.subheading.family;
    const subWt    = fontRoles.subheading.weight;
    const bodyFam  = fontRoles.body.family;
    const bodyWt   = fontRoles.body.weight;

    const hColors = ['h1Color','h2Color','h3Color','h4Color','h5Color','h6Color']
      .map(k => resolveTypoColor(typoColors[k].group, typoColors[k].slug));
    const bodyColor = resolveTypoColor(typoColors.bodyText.group, typoColors.bodyText.slug);

    function sizeAt(name) {
      const s = typoScale.find(t => t.name === name);
      return s ? Math.round(evalClampPx(s.minPx, s.maxPx, VW)) : 16;
    }

    const LABEL_W = 80; // left column for tag labels
    const TEXT_X  = PAD + LABEL_W;
    const TEXT_W  = SW - TEXT_X - PAD;

    const elems = [];
    let y = PAD;

    function sectionHead(title) {
      elems.push(`<text x="${PAD}" y="${y + 18}" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="${fgColor}" opacity="0.5" text-transform="uppercase">${escXML(title)}</text>`);
      y += 30;
    }

    function tagLabel(tag, rowY, color) {
      elems.push(`<text x="${PAD}" y="${rowY}" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="${color || fgColor}" opacity="0.4">${escXML(tag)}</text>`);
    }

    // ── Typography Preview ──
    sectionHead('Typography Preview');

    const headingDefs = [
      { tag: 'H1', size: sizeAt('xx-large'),    family: headFam, weight: headWt,  color: hColors[0] },
      { tag: 'H2', size: sizeAt('large'),        family: headFam, weight: headWt,  color: hColors[1] },
      { tag: 'H3', size: sizeAt('emphasis'),     family: headFam, weight: subWt,   color: hColors[2] },
      { tag: 'H4', size: sizeAt('intermediate'), family: subFam,  weight: subWt,   color: hColors[3] },
      { tag: 'H5', size: sizeAt('normal'),       family: subFam,  weight: subWt,   color: hColors[4] },
      { tag: 'H6', size: sizeAt('small'),        family: subFam,  weight: subWt,   color: hColors[5] },
    ];

    headingDefs.forEach(({ tag, size, family, weight, color }) => {
      const baseline = y + size;
      tagLabel(tag, baseline, color);
      elems.push(`<text x="${TEXT_X}" y="${baseline}" font-family="${escXML(family)},Arial,sans-serif" font-size="${size}" font-weight="${weight}" fill="${color}">${escXML(tag + ' — The quick brown fox jumps over the lazy dog')}</text>`);
      y += size * 1.3 + GAP;
    });

    // Lede
    const ledeSize = sizeAt('intermediate');
    tagLabel('Lede', y + ledeSize, bodyColor);
    elems.push(`<text x="${TEXT_X}" y="${y + ledeSize}" font-family="${escXML(bodyFam)},Arial,sans-serif" font-size="${ledeSize}" font-weight="${bodyWt}" fill="${bodyColor}">An introductory paragraph that draws the reader in with a broader statement about the topic.</text>`);
    y += ledeSize * 1.4 + GAP;

    // Paragraph with inline link (two tspans)
    const paraSize = sizeAt('normal');
    const paraText1 = 'Body text establishes the reading rhythm of your content. ';
    const paraText2 = 'Inline links';
    const paraText3 = ' should be clearly distinguishable from surrounding text.';
    tagLabel('Paragraph', y + paraSize, bodyColor);
    elems.push(`<text x="${TEXT_X}" y="${y + paraSize}" font-family="${escXML(bodyFam)},Arial,sans-serif" font-size="${paraSize}" font-weight="${bodyWt}" fill="${bodyColor}">${escXML(paraText1)}<tspan fill="${linkColor}" text-decoration="underline">${escXML(paraText2)}</tspan><tspan fill="${bodyColor}">${escXML(paraText3)}</tspan></text>`);
    y += paraSize * 1.4 + GAP * 2;

    // ── Type Scale ──
    sectionHead('Fluid Type Scale (at 1400px viewport)');

    const sortedScale = [...typoScale].sort((a, b) => b.minPx - a.minPx);
    sortedScale.forEach(size => {
      const px = Math.round(evalClampPx(size.minPx, size.maxPx, VW));
      // Meta label: name + clamp
      elems.push(`<text x="${PAD}" y="${y + 11}" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="${fgColor}" opacity="0.45">${escXML(size.label)}</text>`);
      elems.push(`<text x="${TEXT_X}" y="${y + 11}" font-family="Arial,sans-serif" font-size="9" fill="${fgColor}" opacity="0.3">${escXML(wpClamp(size.minPx, size.maxPx))}</text>`);
      y += 14;
      elems.push(`<text x="${PAD}" y="${y + px}" font-family="${escXML(bodyFam)},Arial,sans-serif" font-size="${px}" font-weight="${bodyWt}" fill="${fgColor}">The quick brown fox</text>`);
      y += px * 1.3 + GAP;
    });

    const totalH = y + PAD;
    const svg = [
      `<svg xmlns="http://www.w3.org/2000/svg" width="${SW}" height="${totalH}" viewBox="0 0 ${SW} ${totalH}">`,
      `  <rect width="${SW}" height="${totalH}" fill="${bgColor}"/>`,
      ...elems.map(e => '  ' + e),
      `</svg>`
    ].join('\n');

    const blob = new Blob([svg], { type: 'image/svg+xml' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'typography-system.svg'; a.click();
  }
}

function exportUtilitiesSVG() {
  const PAD = 28, GROUP_GAP = 20, SECTION_GAP = 32;
  const sem      = currentSystem.semantic || {};
  const pageBg   = (darkMode ? currentSystem.grays?.[6] : currentSystem.grays?.[0]) || '#f5f5f5';
  const sectionBg = sem.background || '#ffffff';
  const fgColor  = sem.foreground  || '#1f2020';
  const revColor = sem.reverse     || '#ffffff';
  const panelBg  = resolveSlug('base-plus-3');
  const panelFg  = labelColor(panelBg);
  const panelLabel = labelColor(panelBg) === '#ffffff' ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.45)';

  // Resolve interactive colors (with dark-mode swap already applied in updateUtilitiesPreview logic)
  let int_    = resolveUtil('interactive');
  let intHov  = resolveUtil('interactiveHover');
  let intAct  = resolveUtil('interactiveActive');
  let intOutBg= resolveUtil('interactiveOutlineBg');
  let rev_    = resolveUtil('interactiveReverse');
  let revHov  = resolveUtil('interactiveReverseHover');
  let revAct  = resolveUtil('interactiveReverseActive');
  let revOutBg= resolveUtil('interactiveReverseOutlineBg');
  if (darkMode) {
    [int_, rev_] = [rev_, int_]; [intHov, revHov] = [revHov, intHov];
    [intAct, revAct] = [revAct, intAct]; [intOutBg, revOutBg] = [revOutBg, intOutBg];
  }
  const uiBorderColor   = resolveUtil('uiBorder');
  const tableBorderColor= resolveUtil('tableBorder');
  const tableHeaderColor= resolveUtil('tableHeader');
  const tableStripeColor= resolveUtil('tableStripe');

  const bodyFont        = (fontRoles?.body?.family        || 'Arial, sans-serif').split(',')[0].replace(/['"]/g,'').trim();
  const interactiveFont = (fontRoles?.interactive?.family || 'Arial, sans-serif').split(',')[0].replace(/['"]/g,'').trim();

  // Layout constants
  const canvasW   = 680;
  const inner     = canvasW - PAD * 2;
  const BTN_W     = 120, BTN_H = 36, BTN_R = 4, BTN_GAP = 12;
  const LABEL_H   = 18, ROW_GAP = 14, TITLE_H = 26, SUBLABEL_H = 16;

  const bgRects = [], elems = [];
  let y = PAD;

  function sectionTitle(title) {
    elems.push(`<text x="${PAD}" y="${y + 18}" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="${fgColor}">${escXML(title)}</text>`);
    y += TITLE_H;
  }
  function rowLabel(text, fill) {
    elems.push(`<text x="${PAD}" y="${y + 12}" font-family="Arial,sans-serif" font-size="11" font-weight="600" fill="${fill || fgColor}" opacity="0.6">${escXML(text)}</text>`);
    y += SUBLABEL_H;
  }
  function btn(x, bY, label, bg, border, textColor, outline) {
    if (outline) {
      elems.push(`<rect x="${x}" y="${bY}" width="${BTN_W}" height="${BTN_H}" rx="${BTN_R}" fill="${bg}" stroke="${border}" stroke-width="2"/>`);
    } else {
      elems.push(`<rect x="${x}" y="${bY}" width="${BTN_W}" height="${BTN_H}" rx="${BTN_R}" fill="${bg}"/>`);
    }
    elems.push(`<text x="${x + BTN_W/2}" y="${bY + BTN_H/2 + 5}" font-family="${escXML(interactiveFont)},Arial,sans-serif" font-size="13" font-weight="bold" fill="${textColor}" text-anchor="middle">${escXML(label)}</text>`);
  }
  function stateLabel(x, bY, label) {
    elems.push(`<text x="${x + BTN_W/2}" y="${bY + BTN_H + 13}" font-family="Arial,sans-serif" font-size="9" fill="${fgColor}" opacity="0.45" text-anchor="middle">${escXML(label)}</text>`);
  }
  function btnRow(rowY, configs) {
    configs.forEach(({ label, stateLabel: sl, bg, border, textColor, outline }, i) => {
      const x = PAD + i * (BTN_W + BTN_GAP);
      btn(x, rowY, label, bg, border || bg, textColor, outline);
      elems.push(`<text x="${x + BTN_W/2}" y="${rowY + BTN_H + 13}" font-family="Arial,sans-serif" font-size="9" fill="${fgColor}" opacity="0.45" text-anchor="middle">${escXML(sl)}</text>`);
    });
    return BTN_H + 16; // height consumed
  }

  // ── Interactive Buttons ──
  const btnSectionStart = y;
  sectionTitle('Interactive Buttons');

  rowLabel('Interactive');
  y += 4;
  const bRow1H = btnRow(y, [
    { label: 'Default', sl: 'Default', bg: int_,    textColor: labelColor(int_) },
    { label: 'Default', sl: 'Hover',   bg: intHov,  textColor: labelColor(intHov) },
    { label: 'Default', sl: 'Active',  bg: intAct,  textColor: labelColor(intAct) },
  ]);
  y += bRow1H + ROW_GAP;

  rowLabel('Interactive Outline');
  y += 4;
  const bRow2H = btnRow(y, [
    { label: 'Outline', sl: 'Default', bg: intOutBg, border: int_,    textColor: int_,    outline: true },
    { label: 'Outline', sl: 'Hover',   bg: intOutBg, border: intHov,  textColor: intHov,  outline: true },
    { label: 'Outline', sl: 'Active',  bg: intOutBg, border: intAct,  textColor: intAct,  outline: true },
  ]);
  y += bRow2H + ROW_GAP;

  // Reverse panel
  const panelStartY = y;
  y += 14; // inner padding

  rowLabel('Interactive Reverse', panelLabel);
  y += 4;
  const bRow3H = btnRow(y, [
    { label: 'Default', sl: 'Default', bg: rev_,    textColor: labelColor(rev_) },
    { label: 'Default', sl: 'Hover',   bg: revHov,  textColor: labelColor(revHov) },
    { label: 'Default', sl: 'Active',  bg: revAct,  textColor: labelColor(revAct) },
  ]);
  // Override state labels to use panel fg color
  y += bRow3H + ROW_GAP;

  rowLabel('Interactive Outline Reverse', panelLabel);
  y += 4;
  const bRow4H = btnRow(y, [
    { label: 'Outline', sl: 'Default', bg: revOutBg, border: rev_,    textColor: rev_,    outline: true },
    { label: 'Outline', sl: 'Hover',   bg: revOutBg, border: revHov,  textColor: revHov,  outline: true },
    { label: 'Outline', sl: 'Active',  bg: revOutBg, border: revAct,  textColor: revAct,  outline: true },
  ]);
  y += bRow4H + 14; // inner padding bottom
  bgRects.push(`<rect x="${PAD}" y="${panelStartY}" width="${inner}" height="${y - panelStartY}" rx="8" fill="${panelBg}"/>`);
  y += GROUP_GAP;
  const btnSectionH = y - btnSectionStart;
  bgRects.unshift(`<rect x="4" y="${btnSectionStart - 8}" width="${canvasW - 8}" height="${btnSectionH + 4}" rx="10" fill="${sectionBg}"/>`);

  y += SECTION_GAP;

  // ── Input ──
  const inputSectionStart = y;
  sectionTitle('Form Input');
  y += 6;
  // Label
  elems.push(`<text x="${PAD}" y="${y + 12}" font-family="${escXML(bodyFont)},Arial,sans-serif" font-size="12" font-weight="600" fill="${fgColor}">${escXML('Input label')}</text>`);
  y += 20;
  // Input box
  const INP_W = 260, INP_H = 36;
  elems.push(`<rect x="${PAD}" y="${y}" width="${INP_W}" height="${INP_H}" rx="4" fill="${sectionBg}" stroke="${uiBorderColor}" stroke-width="1.5"/>`);
  elems.push(`<text x="${PAD + 10}" y="${y + INP_H/2 + 5}" font-family="${escXML(bodyFont)},Arial,sans-serif" font-size="13" fill="${fgColor}" opacity="0.4">${escXML('Input field')}</text>`);
  y += INP_H + GROUP_GAP;
  const inputSectionH = y - inputSectionStart;
  bgRects.push(`<rect x="4" y="${inputSectionStart - 8}" width="${canvasW - 8}" height="${inputSectionH + 4}" rx="10" fill="${sectionBg}"/>`);

  y += SECTION_GAP;

  // ── Table ──
  const tableSectionStart = y;
  sectionTitle('Table');
  y += 6;
  const TBL_W = inner, ROW_H = 36, COL_LABEL_W = 180;
  const tableRows = [
    { label: 'Table Header',      bg: tableHeaderColor, textColor: revColor, border: tableBorderColor, bold: true },
    { label: 'Table Row',         bg: 'transparent',    textColor: fgColor,  border: tableBorderColor, bold: false },
    { label: 'Table Striped Row', bg: tableStripeColor, textColor: fgColor,  border: tableBorderColor, bold: false },
    { label: 'Table Row',         bg: 'transparent',    textColor: fgColor,  border: tableBorderColor, bold: false },
  ];
  tableRows.forEach(({ label, bg, textColor, border, bold }) => {
    if (bg !== 'transparent') elems.push(`<rect x="${PAD}" y="${y}" width="${TBL_W}" height="${ROW_H}" fill="${bg}"/>`);
    elems.push(`<line x1="${PAD}" y1="${y + ROW_H}" x2="${PAD + TBL_W}" y2="${y + ROW_H}" stroke="${border}" stroke-width="1"/>`);
    elems.push(`<text x="${PAD + 12}" y="${y + ROW_H/2 + 5}" font-family="${escXML(bodyFont)},Arial,sans-serif" font-size="13" font-weight="${bold ? 'bold' : 'normal'}" fill="${textColor}">${escXML(label)}</text>`);
    y += ROW_H;
  });
  // Table outer border top
  elems.push(`<line x1="${PAD}" y1="${y - tableRows.length * ROW_H}" x2="${PAD + TBL_W}" y2="${y - tableRows.length * ROW_H}" stroke="${tableBorderColor}" stroke-width="1"/>`);
  y += GROUP_GAP;
  const tableSectionH = y - tableSectionStart;
  bgRects.push(`<rect x="4" y="${tableSectionStart - 8}" width="${canvasW - 8}" height="${tableSectionH + 4}" rx="10" fill="${sectionBg}"/>`);

  y += PAD;

  const totalH = y;
  const svg = [
    `<svg xmlns="http://www.w3.org/2000/svg" width="${canvasW}" height="${totalH}" viewBox="0 0 ${canvasW} ${totalH}">`,
    `  <rect width="${canvasW}" height="${totalH}" fill="${pageBg}"/>`,
    ...bgRects.map(e => '  ' + e),
    ...elems.map(e => '  ' + e),
    `</svg>`
  ].join('\n');

  const blob = new Blob([svg], { type: 'image/svg+xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'utilities-system.svg';
  a.click();
}

/* ===========================
   URL STATE: TYPOGRAPHY
=========================== */

const _origEncodeStateToURL = encodeStateToURL;
encodeStateToURL = function() {
  let qs = _origEncodeStateToURL();
  const p = new URLSearchParams(qs);
  if (activeTab !== 'color') p.set('tab', activeTab);
  // Font roles — only encode if they differ from defaults
  const roleKeys = ['body','heading','subheading','interactive'];
  roleKeys.forEach(k => {
    const r = fontRoles[k], d = FONT_ROLE_DEFAULTS[k];
    if (r.family     !== d.family)     p.set(`tf_${k}_fam`, r.family);
    if (r.weight     !== d.weight)     p.set(`tf_${k}_wt`,  r.weight);
  });
  // Typography colors
  Object.entries(typoColors).forEach(([k, v]) => {
    const d = TYPO_COLOR_DEFAULTS[k];
    if (v.group !== d.group) p.set(`tc_${k}_g`, v.group);
    if (v.slug  !== d.slug)  p.set(`tc_${k}_s`, v.slug);
  });
  // Type scale — only encode rows that differ from defaults
  typoScale.forEach((s, i) => {
    const d = TYPO_SCALE_DEFAULTS[i];
    if (s.minPx !== d.minPx) p.set(`ts_${s.name}_min`, String(s.minPx));
    if (s.maxPx !== d.maxPx) p.set(`ts_${s.name}_max`, String(s.maxPx));
  });
  return p.toString();
};

const _origApplyStateFromURL = applyStateFromURL;
applyStateFromURL = function() {
  _origApplyStateFromURL();
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('tab')) {
    // Defer tab switch until after generate() so currentSystem is populated
    const t = p.get('tab');
    if (t === 'typography') requestAnimationFrame(() => switchTab('typography'));
  }
  const roleKeys = ['body','heading','subheading','interactive'];
  roleKeys.forEach(k => {
    if (p.has(`tf_${k}_fam`)) fontRoles[k].family     = p.get(`tf_${k}_fam`);
    if (p.has(`tf_${k}_wt`))  fontRoles[k].weight     = p.get(`tf_${k}_wt`);
  });
  typoScale.forEach(s => {
    if (p.has(`ts_${s.name}_min`)) s.minPx = parseInt(p.get(`ts_${s.name}_min`));
    if (p.has(`ts_${s.name}_max`)) s.maxPx = parseInt(p.get(`ts_${s.name}_max`));
  });
  Object.keys(typoColors).forEach(k => {
    if (p.has(`tc_${k}_g`)) typoColors[k].group = p.get(`tc_${k}_g`);
    if (p.has(`tc_${k}_s`)) typoColors[k].slug  = p.get(`tc_${k}_s`);
  });
};

applyStateFromURL();
generate();
</script>
