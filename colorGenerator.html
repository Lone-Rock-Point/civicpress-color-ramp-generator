<style>
body{
  font-family:Arial,sans-serif;
  margin:0;
  padding:20px;
  background:var(--color-base-minus-3,#fafafa);
  color:var(--color-foreground,#1f2020);
}

h1{
  font-size:22px;
  margin-bottom:18px;
}
h1[contenteditable]{
  outline:none;
  border-bottom:2px dashed transparent;
  cursor:text;
  transition:border-color 0.15s;
}
h1[contenteditable]:hover,
h1[contenteditable]:focus{
  border-bottom-color:var(--color-base,#ccc);
}

.input-grid{
  display:grid;
  grid-template-columns:repeat(3,190px);
  gap:10px;
  margin-bottom:12px;
}

.input-options{
  display:flex;
  gap:18px;
  align-items:center;
  margin-bottom:18px;
  flex-wrap:wrap;
}

select{
  padding:7px 10px;
  border:1px solid var(--color-base,#ccc);
  border-radius:6px;
  background:var(--color-background,white);
  color:var(--color-foreground,#1f2020);
  font-size:13px;
  cursor:pointer;
}

.ext-card{
  border-top:1px solid #e8e8e8;
  padding-top:16px;
  margin-top:16px;
}

.ext-controls{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:10px;
  flex-wrap:wrap;
}

input{
  padding:8px;
  border:1px solid var(--color-base,#ccc);
  border-radius:6px;
  background:var(--color-background,white);
  color:var(--color-foreground,#1f2020);
}

button{
  padding:10px 14px;
  background:var(--color-interactive,#0047BA);
  color:var(--color-interactive-text,white);
  border:none;
  border-radius:6px;
  cursor:pointer;
}

button:hover{
  background:var(--color-interactive-hover,#003A8F);
}

.export-btn{
  background:var(--color-base-plus-1,#1f2020);
  margin-left:10px;
}

.export-btn:hover{
  background:var(--color-base-plus-2,#3a3b3b);
}

.figma-btn{
  background:var(--color-secondary-ui,#7B61FF);
  color:var(--color-secondary-ui-text,white);
}

.figma-btn:hover{
  background:var(--color-secondary-ui-hover,#6146e0);
}

.group{
  margin-top:28px;
  padding:18px;
  border-radius:12px;
  background:var(--color-background,white);
  box-shadow:var(--shadow-group,0 2px 10px rgba(0,0,0,0.08));
}

.group-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}

.group-title{
  font-size:18px;
  font-weight:bold;
}

.reset-btn{
  font-size:11px;
  padding:3px 10px;
  background:transparent;
  color:var(--color-base-plus-1,#777);
  border:1px solid var(--color-base,#ddd);
  border-radius:4px;
  cursor:pointer;
  margin-left:0;
}

.reset-btn:hover{
  background:var(--color-base-minus-2,#f5f5f5);
  border-color:var(--color-base-plus-1,#aaa);
  color:var(--color-foreground,#333);
}

.sub-title{
  font-size:13px;
  font-weight:bold;
  margin:14px 0 8px;
}

.row{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.swatch{
  width:95px;
  height:95px;
  border-radius:8px;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  padding:6px;
  font-size:10px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:var(--shadow-swatch,0 2px 6px rgba(0,0,0,0.12));
  position:relative;
  transition: transform 0.1s;
}

.swatch:hover {
  transform: scale(1.05);
}

.contrast-badges{
  position:absolute;
  top:6px;
  left:6px;
  display:flex;
  flex-direction:column;
  gap:2px;
  pointer-events:none;
}

.contrast-badge{
  font-size:8px;
  font-weight:bold;
  line-height:1.3;
  letter-spacing:0.05em;
  text-shadow:0 0 3px rgba(128,128,128,0.5);
}

/* Anchor badge shown on the swatch that matches the input hex */
.anchor-badge {
  position:absolute;
  top:6px;
  right:6px;
  background:rgba(255,255,255,0.92);
  border-radius:3px;
  padding:1px 4px;
  font-size:9px;
  font-weight:bold;
  color:#1f2020;
  letter-spacing:0.03em;
}

/* Brand toggle button — star in upper right of swatch */
.brand-badge {
  position:absolute;
  top:4px;
  right:5px;
  background:none;
  border:none;
  cursor:pointer;
  font-size:13px;
  line-height:1;
  padding:0;
  color:white;
  opacity:0.2;
  text-shadow:0 0 4px rgba(0,0,0,0.5);
  transition:opacity 0.15s;
  z-index:1;
}
.brand-badge:hover { opacity:0.65; }
.brand-badge.active { opacity:1; }

.label{
  background:var(--label-bg,rgba(255,255,255,0.75));
  padding:2px 4px;
  border-radius:4px;
  text-align:center;
}

.hex-input{
  background:transparent;
  border:none;
  font-size:10px;
  font-weight:bold;
  width:68px;
  text-align:center;
  color:inherit;
  padding:0;
  cursor:text;
  outline:none;
  font-family:monospace;
  display:block;
  margin:0 auto;
}

.hex-input:focus{
  outline:1px solid var(--color-ui-border,rgba(0,0,0,0.3));
  border-radius:2px;
}

.hex-input.invalid{
  outline:2px solid #E63C2F;
  border-radius:2px;
  color:#E63C2F;
}

/* Small pill showing which slot the input landed in */
.anchor-info {
  font-size:11px;
  color:var(--color-base-plus-1,#555);
  margin-bottom:6px;
}

.anchor-info strong {
  color:var(--color-interactive,#0047BA);
}

.slider-wrap{
  margin-top:12px;
}

.slider-wrap label{
  display:block;
  font-size:12px;
  margin-bottom:4px;
}

.slider-value{
  font-weight:bold;
}

input[type=range]{
  width:220px;
}

.tooltip{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:var(--color-foreground,#1f2020);
  color:var(--color-reverse,white);
  padding:8px 12px;
  border-radius:6px;
  opacity:0;
  transition:0.2s;
  font-size:12px;
  pointer-events:none;
}

.tooltip.show{
  opacity:1;
}

#clr-picker{ z-index:9999; }

/* Undo Coloris .clr-field wrapper on hex swatch inputs */
.clr-field:has(.hex-input) {
  display: block;
  color: inherit !important;
}
.clr-field:has(.hex-input) > button {
  display: none;
}

.color-source-ui{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:12px;
  flex-wrap:wrap;
  font-size:13px;
}

.step-select{
  background:transparent;
  border:none;
  font-size:10px;
  font-weight:bold;
  width:76px;
  text-align:center;
  color:inherit;
  padding:0;
  cursor:pointer;
  outline:none;
  font-family:inherit;
  display:block;
  margin:0 auto;
}

.step-select:focus{
  outline:1px solid var(--color-ui-border,rgba(0,0,0,0.3));
  border-radius:2px;
}

/* ── Tab bar ── */
.tab-bar{
  display:flex;
  gap:0;
  margin:16px 0 0;
  border-bottom:2px solid var(--color-base,#ccc);
}
.tab-btn{
  padding:8px 22px;
  background:transparent;
  color:var(--color-foreground,#1f2020);
  border:2px solid transparent;
  border-radius:6px 6px 0 0;
  cursor:pointer;
  font-size:14px;
  font-weight:500;
  border-bottom:2px solid transparent;
  margin-bottom:-2px;
  transition:background 0.1s,color 0.1s,border-color 0.1s;
}
.tab-btn:hover{
  background:var(--color-base-minus-2,#f5f5f5);
}
.tab-btn.active{
  background:var(--color-background,white);
  border-color:var(--color-interactive,#0047BA);
  border-bottom-color:var(--color-background,white);
  color:var(--color-interactive,#0047BA);
  font-weight:700;
}
.tab-content{ margin-top:0; }

/* ── Export modal ── */
#export-modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  z-index:10000;
  align-items:center;
  justify-content:center;
}
#export-modal.open{ display:flex; }
.modal-box{
  background:var(--color-background,white);
  border-radius:14px;
  padding:28px 32px;
  min-width:280px;
  box-shadow:0 8px 48px rgba(0,0,0,0.22);
}
.modal-box h3{ margin:0 0 18px; font-size:16px; }
.modal-options{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-bottom:24px;
}
.modal-options label{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:14px;
  cursor:pointer;
}
.modal-options input[type=checkbox]{ width:16px; height:16px; cursor:pointer; }
.modal-actions{
  display:flex;
  gap:8px;
  justify-content:flex-end;
}
.modal-cancel-btn{
  padding:10px 14px;
  background:transparent;
  color:var(--color-foreground,#333);
  border:1px solid var(--color-base,#ccc);
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
}
.modal-cancel-btn:hover{ background:var(--color-base-minus-2,#f5f5f5); }

/* ── Color slot picker ── */
.color-slot-row{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:14px;
  margin-top:8px;
}
.color-slot-card{
  background:var(--color-base-minus-3,#fafafa);
  border-radius:8px;
  padding:14px;
}
.color-slot-title{
  font-size:13px;
  font-weight:700;
  margin-bottom:10px;
  color:var(--color-foreground,#1f2020);
  text-transform:uppercase;
  letter-spacing:0.05em;
}
.color-slot-selects{
  display:flex;
  gap:6px;
  align-items:center;
  flex-wrap:wrap;
}
.color-slot-selects select{ flex:1; min-width:80px; font-size:12px; padding:6px 8px; }
.color-dot{
  width:22px;
  height:22px;
  border-radius:50%;
  border:1px solid rgba(0,0,0,0.12);
  flex-shrink:0;
}

/* ── Typography tab layout ── */
.font-settings-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
  gap:14px;
  margin-top:8px;
}
.font-role-card{
  background:var(--color-base-minus-3,#fafafa);
  border-radius:8px;
  padding:14px;
}
.font-role-title{
  font-size:13px;
  font-weight:700;
  margin-bottom:12px;
  color:var(--color-foreground,#1f2020);
  text-transform:uppercase;
  letter-spacing:0.05em;
}
.font-role-card .field-label{
  display:block;
  font-size:10px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:0.06em;
  color:var(--color-base-plus-1,#777);
  margin:8px 0 3px;
}
.font-role-card input[type=text],
.font-role-card select{
  width:100%;
  box-sizing:border-box;
  font-size:12px;
  padding:6px 8px;
}
.font-role-card input[type=text]::-webkit-calendar-picker-indicator{ display:none !important; }

    .trim()
    .toLowerCase()
    .replace(/\s+/g, '-');
  return `${base}-${step}${isVivid ? 'v' : ''}`;

  const data = USWDS_COLORS[family] || {};

  const data = USWDS_COLORS[family] || {};

=========================== */

function hexToHsl(hex){
  let r=parseInt(hex.substr(1,2),16)/255;
  let g=parseInt(hex.substr(3,2),16)/255;
  let b=parseInt(hex.substr(5,2),16)/255;

  let max=Math.max(r,g,b);
  let min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;

  if(max===min){
    h=s=0;
  } else {
    let d=max-min;
    s=l>0.5 ? d/(2-max-min) : d/(max+min);
    switch(max){
      case r: h=(g-b)/d+(g<b?6:0); break;
      case g: h=(b-r)/d+2; break;
      case b: h=(r-g)/d+4; break;
    }
    h*=60;
  }

  return {h,s,l};
}

function hslToHex(h,s,l){
  l = Math.max(0, Math.min(1, l));
  s = Math.max(0, Math.min(1, s));

  let c=(1-Math.abs(2*l-1))*s;
  let x=c*(1-Math.abs((h/60)%2-1));
  let m=l-c/2;
  let r=0,g=0,b=0;

  if(h<60){r=c;g=x;}
  else if(h<120){r=x;g=c;}
  else if(h<180){g=c;b=x;}
  else if(h<240){g=x;b=c;}
  else if(h<300){r=x;b=c;}
  else{r=c;b=x;}

  r=Math.round((r+m)*255);
  g=Math.round((g+m)*255);
  b=Math.round((b+m)*255);

  return "#" + [r,g,b].map(v=>v.toString(16).padStart(2,"0")).join("");
}

/* ===========================
   SMART ANCHOR RAMP
   
   Instead of always placing the input at slot 4 (index 3),
   we measure its lightness and choose the closest slot from
   a fixed 7-point scale. Then we rebuild the full ramp using
   a consistent step size derived from available headroom.

   Target lightness values for the 7 slots (lightest → darkest):
     Slot 1: ~0.93   Slot 2: ~0.80   Slot 3: ~0.65
     Slot 4: ~0.50   Slot 5: ~0.36   Slot 6: ~0.22   Slot 7: ~0.10
=========================== */

const SLOT_TARGETS = [0.93, 0.80, 0.65, 0.50, 0.36, 0.22, 0.10];

/**
 * Given a hex color, decide which of the 7 slots it best fits,
 * then generate the full 7-step ramp so that:
 *  - The input hex lands exactly at its slot
 *  - Surrounding slots use uniform steps calculated from available room
 *
 * Returns { colors: string[7], anchorSlot: 0-6 }
 */
function ramp7Smart(hex) {
  const { h, s, l } = hexToHsl(hex);

  // Find the closest slot by lightness distance
  let anchorSlot = 0;
  let minDist = Infinity;
  SLOT_TARGETS.forEach((target, i) => {
    const dist = Math.abs(target - l);
    if (dist < minDist) { minDist = dist; anchorSlot = i; }
  });

  // How much lightness room exists above and below the anchor
  const lightnessAbove = 0.97 - l;   // max we'll go toward white
  const lightnessBelow = l - 0.12;   // max we'll go toward black (floor raised to avoid near-black)

  // Number of slots above and below the anchor
  const slotsAbove = anchorSlot;           // indices 0..(anchorSlot-1)
  const slotsBelow = 6 - anchorSlot;       // indices (anchorSlot+1)..6

  // Per-step size in each direction (guard against divide-by-zero)
  const stepUp   = slotsAbove > 0 ? lightnessAbove / slotsAbove : 0;
  const stepDown = slotsBelow > 0 ? lightnessBelow / slotsBelow : 0;

  const colors = [];
  for (let i = 0; i < 7; i++) {
    if (i === anchorSlot) {
      colors.push(hex); // preserve the exact input color
    } else if (i < anchorSlot) {
      // Lighter slots — step away from anchor upward
      const distance = anchorSlot - i;
      colors.push(hslToHex(h, s, l + stepUp * distance));
    } else {
      // Darker slots — step away from anchor downward
      const distance = i - anchorSlot;
      colors.push(hslToHex(h, s, l - stepDown * distance));
    }
  }

  return { colors, anchorSlot };
}

/* 5-step extended ramp (unchanged) */
function ramp5(hex, shift){
  const { h, s } = hexToHsl(hex);
  const shifted = (h + shift) % 360;
  return [0.93, 0.75, 0.50, 0.30, 0.18].map(v => hslToHex(shifted, s, v));
}

function showTooltip(text) {

function swatch(color, label, isAnchor = false, onChange = null, uswdsConfig = null, brandKey = null){
  const d = document.createElement("div");
  d.className = "swatch";
  d.style.background = color;
  let currentColor = color;

  /* Contrast badges */
  const badgesEl = document.createElement("div");
  badgesEl.className = "contrast-badges";

  function refreshBadges() {
    const bg = currentSystem.semantic?.background || "#fafafa";
    const fg = currentSystem.semantic?.foreground || "#1f2020";
    badgesEl.innerHTML = "";
    [[fg, "fg"], [bg, "bg"]].forEach(([semHex]) => {
      const ratio = contrastRatio(currentColor, semHex);
      const level = ratio >= 7 ? "AAA" : ratio >= 4.5 ? "AA" : null;
      if (!level) return;
      const b = document.createElement("span");
      b.className = "contrast-badge";
      b.innerText = level;
      b.style.color = semHex;
      badgesEl.appendChild(b);
    });
  }
  swatchRegistry.push(refreshBadges);

  let controlHTML;
  if (uswdsConfig) {
    const { family, step } = uswdsConfig;
    const data = USWDS_COLORS[family] || {};
    const steps = Object.keys(data).map(Number).sort((a,b)=>a-b).filter(s=>s>=0);
    const opts = steps.map(s =>
      `<option value="${data[s]}"${s===step?' selected':''}>${uswdsTokenName(family, s)}</option>`
    ).join("");
    controlHTML = `<select class="step-select">${opts}</select>`;
  } else {
    controlHTML = `<input class="hex-input" type="text" value="${color}" spellcheck="false" />`;
  }

  d.innerHTML = `
    <span class="anchor-badge"${isAnchor ? '' : ' style="display:none"'}>INPUT</span>
    <div class="label">
      <div>${label}</div>
      ${controlHTML}
    </div>
  `;

  if (uswdsConfig) {
    const sel = d.querySelector(".step-select");
    sel.addEventListener("change", () => {
      currentColor = sel.value;
      d.style.background = sel.value;
      refreshBadges();
      if (onChange) onChange(sel.value);
      applyTheme();
    });
    d.addEventListener("click", (e) => {
      if (e.target.closest('.label')) return;
      navigator.clipboard.writeText(sel.value);
      showTooltip("Copied " + sel.value);
    });
  } else {
    const hexInput = d.querySelector(".hex-input");
    bindColorPicker(hexInput);
    let lastValidColor = color;
    hexInput.addEventListener("input", () => {
      const val = hexInput.value.trim();
      if (isValidColor(val)) {
        hexInput.classList.remove("invalid");
        currentColor = val;
        d.style.background = val;
        lastValidColor = val;
        refreshBadges();
        if (onChange) onChange(val);
        applyTheme();
      } else {
        hexInput.classList.add("invalid");
      }
    });
    hexInput.addEventListener("blur", () => {
      if (hexInput.classList.contains("invalid")) {
        hexInput.value = lastValidColor;
        hexInput.classList.remove("invalid");
      }
    });
    d.addEventListener("click", (e) => {
      if (e.target.closest('.label')) return;
      navigator.clipboard.writeText(hexInput.value);
      showTooltip("Copied " + hexInput.value);
    });
  }

  d.appendChild(badgesEl);
  refreshBadges();

  // Brand toggle — click to mark this color as a brand color (shows ★ in SVG as *)
  if (brandKey !== null) {
    const brandBtn = document.createElement("button");
    brandBtn.type = "button";
    brandBtn.className = "brand-badge" + (brandColors.has(brandKey) ? " active" : "");
    brandBtn.title = "Mark as brand color";
    brandBtn.textContent = "★";
    brandBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      if (brandColors.has(brandKey)) {
        brandColors.delete(brandKey);
        brandBtn.classList.remove("active");
      } else {
        brandColors.add(brandKey);
        brandBtn.classList.add("active");
      }
      scheduleURLUpdate();
    });
    d.appendChild(brandBtn);
  }

  return d;
}

function row(colors, labels, anchorSlot = -1, onChange = null, swatchConfigs = null, brandKeys = null){
  const r = document.createElement("div");
  r.className = "row";
  colors.forEach((c, i) => {
    const cfg = swatchConfigs ? swatchConfigs[i] : null;
    const bk  = brandKeys ? brandKeys[i] : null;
    r.appendChild(swatch(c, labels[i], i === anchorSlot,
      onChange ? (val) => onChange(i, val) : null, cfg, bk));
  });
  return r;
}

function buildColorSourceUI(sectionKey, families, onRebuild) {
  const state = sectionState[sectionKey];
  // Gray colors live at currentSystem.grays, not currentSystem.gray
  const systemColorKey = sectionKey === 'gray' ? 'grays' : sectionKey;
  const displayFamilies = SECTION_RAMP_DEFAULTS[sectionKey]
    ? ["CivicPress Default", ...families]
    : families;

  const wrap = document.createElement("div");
  wrap.className = "color-source-ui";

  const modeSelect = document.createElement("select");
  modeSelect.innerHTML = '<option value="uswds">USWDS</option><option value="custom">Custom</option>';
  modeSelect.value = state.mode;

  const familyWrap = document.createElement("span");
  const familySelect = document.createElement("select");
  displayFamilies.forEach(f => {
    const o = document.createElement("option");
    o.value = f; o.textContent = f;
    familySelect.appendChild(o);
  });
  if (!displayFamilies.includes(state.family)) state.family = displayFamilies[0];
  familySelect.value = state.family;
  familyWrap.appendChild(familySelect);
  familyWrap.style.display = state.mode === "uswds" ? "" : "none";

  const customWrap = document.createElement("span");
  customWrap.style.display = state.mode === "custom" ? "" : "none";

  const genLabel = document.createElement("label");
  genLabel.style.cssText = "font-size:12px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap";
  const genCheckbox = document.createElement("input");
  genCheckbox.type = "checkbox";
  genCheckbox.checked = !!state.generateRamp;
  genLabel.appendChild(genCheckbox);
  genLabel.appendChild(document.createTextNode("Generate Ramp"));

  const seedWrap = document.createElement("span");
  seedWrap.style.cssText = "display:inline-flex;align-items:center;gap:6px";
  seedWrap.style.display = state.generateRamp ? "inline-flex" : "none";
  const seedIn = document.createElement("input");
  seedIn.type = "text";
  seedIn.value = state.customHex || "#808080";
  seedIn.style.cssText = "width:110px;padding:6px 8px;border:1px solid var(--color-ui-border,#ccc);border-radius:6px";

  const resetRampBtn = document.createElement("button");
  resetRampBtn.textContent = "Reset Ramp";
  resetRampBtn.className = "reset-btn";
  resetRampBtn.style.display = "none";

  seedWrap.appendChild(seedIn);
  seedWrap.appendChild(resetRampBtn);

  customWrap.appendChild(genLabel);
  customWrap.appendChild(seedWrap);

  function syncHex() {
    const v = seedIn.value.trim();
    if (/^#[0-9a-fA-F]{6}$/.test(v)) {
      state.customHex = v;
      if (state.generateRamp) {
        // Clear stored colors so buildRamp generates a fresh ramp from the new seed
        currentSystem[systemColorKey] = [];
        resetRampBtn.style.display = "none";
        onRebuild();
      }
      scheduleURLUpdate();
    }
  }

  resetRampBtn.addEventListener("click", () => {
    currentSystem[systemColorKey] = [];
    resetRampBtn.style.display = "none";
    onRebuild();
    scheduleURLUpdate();
  });
  bindColorPicker(seedIn);
  seedIn.addEventListener("blur", syncHex);
  seedIn.addEventListener("keydown", e => { if (e.key === "Enter") seedIn.blur(); });

  genCheckbox.addEventListener("change", () => {
    state.generateRamp = genCheckbox.checked;
    // When turning generate mode on, clear stored colors so buildRamp generates a fresh ramp
    if (genCheckbox.checked) currentSystem[systemColorKey] = [];
    seedWrap.style.display = state.generateRamp ? "inline-flex" : "none";
    onRebuild();
    scheduleURLUpdate();
  });

  modeSelect.addEventListener("change", () => {
    state.mode = modeSelect.value;
    if (state.mode === "custom") {
      // Seed input defaults to the current Base slot (index 3) of whatever ramp is showing
      const base = currentSystem[systemColorKey] && currentSystem[systemColorKey][3];
      if (base) { state.customHex = base; seedIn.value = base; }
    }
    familyWrap.style.display = state.mode === "uswds" ? "" : "none";
    customWrap.style.display  = state.mode === "custom" ? "" : "none";
    onRebuild();
    scheduleURLUpdate();
  });
  familySelect.addEventListener("change", () => {
    state.family = familySelect.value;
    onRebuild();
    scheduleURLUpdate();
  });

  wrap.appendChild(modeSelect);
  wrap.appendChild(familyWrap);
  wrap.appendChild(customWrap);

  function reset() {
    const def = SECTION_DEFAULTS[sectionKey] || {};
    Object.assign(state, JSON.parse(JSON.stringify(def)));
    modeSelect.value = state.mode;
    familySelect.value = state.family;
    familyWrap.style.display = state.mode === "uswds" ? "" : "none";
    customWrap.style.display  = state.mode === "custom" ? "" : "none";
    genCheckbox.checked = !!state.generateRamp;
    seedWrap.style.display = state.generateRamp ? "inline-flex" : "none";
    if (state.customHex) seedIn.value = state.customHex;
    onRebuild();
  }

  function showResetRamp() { if (state.generateRamp) resetRampBtn.style.display = ""; }

  return { element: wrap, reset, showResetRamp };
}

function group(title, sectionKey, colorName, systemKey) {
  const state = sectionState[sectionKey];
  const g = document.createElement("div");
  g.className = "group";

  const rampArea = document.createElement("div");
  let lastColors = [], lastRampRow = null;

  function buildRamp() {
    rampArea.innerHTML = "";
    const baseLabels = TONE_NAMES_7.map(t => t === "Base" ? colorName : `${colorName} ${t}`);

    if (state.mode === "uswds") {
      const themeDefaults = SECTION_RAMP_DEFAULTS[sectionKey];
      let colors, cfgs;
      if (state.family === "CivicPress Default" && themeDefaults) {
        colors = [...themeDefaults.colors];
        cfgs   = themeDefaults.cfgs;
      } else {
        const steps = getMainSteps(state.family);
        colors = steps.map(s => lookupStep(state.family, s));
        cfgs   = steps.map(s => ({ family: state.family, step: s }));
      }
      // Consume preloaded colors (from URL) once — prevents stale data leaking into later rebuilds
      const preloaded = _preloadedKeys.has(systemKey) ? (currentSystem[systemKey] || []).slice() : null;
      if (preloaded) _preloadedKeys.delete(systemKey);

      if (preloaded && preloaded.length === colors.length) colors = [...preloaded];
      lastColors = colors;
      currentSystem[systemKey] = [...colors];
      rampArea.appendChild(subtitle("Color Ramp"));
      lastRampRow = row(colors, baseLabels, -1, (i, val) => { currentSystem[systemKey][i] = val; }, cfgs,
        colors.map((_, i) => `${sectionKey}:${i}`));
      // Sync step-selects to the actual displayed colors
      lastRampRow.querySelectorAll('.step-select').forEach((sel, i) => { if (colors[i]) sel.value = colors[i]; });
    } else {
      // Consume preloaded colors once here too, so a mode switch to USWDS later doesn't use stale data
      const preloaded = _preloadedKeys.has(systemKey) ? (currentSystem[systemKey] || []).slice() : null;
      if (preloaded) _preloadedKeys.delete(systemKey);

      // Preserve whatever colors are currently showing; fall back to theme defaults
      const preserved = preloaded || currentSystem[systemKey];
      const fallback  = SECTION_RAMP_DEFAULTS[sectionKey]?.colors || Array(7).fill("#808080");
      const baseColors = (preserved && preserved.length === 7) ? [...preserved] : [...fallback];

      if (state.generateRamp && /^#[0-9a-fA-F]{6}$/.test(state.customHex || "")) {
        let { colors: genColors, anchorSlot } = ramp7Smart(state.customHex);
        // Preserve user edits; only generate fresh when currentSystem is empty (seed changed, reset, or first load)
        let colors = preloaded && preloaded.length === genColors.length ? [...preloaded]
          : (currentSystem[systemKey] && currentSystem[systemKey].length === genColors.length)
            ? [...currentSystem[systemKey]]
            : genColors;
        lastColors = colors;
        currentSystem[systemKey] = [...colors];
        if (!currentSystem.anchorSlots) currentSystem.anchorSlots = {};
        currentSystem.anchorSlots[systemKey] = anchorSlot;
        rampArea.appendChild(anchorInfo(anchorSlot, state.customHex));
        rampArea.appendChild(subtitle("Color Ramp"));
        lastRampRow = row(colors, baseLabels, anchorSlot, (i, val) => {
          currentSystem[systemKey][i] = val;
          sourceUI.showResetRamp();
        }, null, colors.map((_, i) => `${sectionKey}:${i}`));
      } else {
        lastColors = baseColors;
        currentSystem[systemKey] = [...baseColors];
        if (!currentSystem.anchorSlots) currentSystem.anchorSlots = {};
        delete currentSystem.anchorSlots[systemKey];
        rampArea.appendChild(subtitle("Color Ramp"));
        lastRampRow = row(baseColors, baseLabels, -1, (i, val) => { currentSystem[systemKey][i] = val; },
          null, baseColors.map((_, i) => `${sectionKey}:${i}`));
      }
    }
    rampArea.appendChild(lastRampRow);
    applyTheme();
  }

  const sourceUI = buildColorSourceUI(sectionKey, NON_GRAY_FAMILIES, buildRamp);
  const { element: sourceEl, reset: resetSection } = sourceUI;
  g.appendChild(groupHeader(title, resetSection));
  g.appendChild(sourceEl);
  g.appendChild(rampArea);
  buildRamp();

  return { element: g };
}

  seedWrap.style.display = state.generateRamp ? "inline-flex" : "none";
  const seedInput = document.createElement("input");
  seedInput.type = "text";
  seedInput.value = state.custom || "#808080";
  seedInput.style.cssText = "width:100px;padding:6px 8px;border:1px solid var(--color-ui-border,#ccc);border-radius:6px";
  seedWrap.appendChild(seedInput);

  customWrap.appendChild(genLabel);
  customWrap.appendChild(seedWrap);

  const resetRampBtn = document.createElement("button");
  resetRampBtn.textContent = "Reset Ramp";
  resetRampBtn.className = "reset-btn";
  resetRampBtn.style.display = "none";

  controls.appendChild(sourceSelect);
  controls.appendChild(uswdsFamilyWrap);
  controls.appendChild(shiftWrap);
  controls.appendChild(customWrap);
  controls.appendChild(resetRampBtn);
  card.appendChild(controls);

  /* Ramp row */
  const EXT5_TARGETS = [0.93, 0.75, 0.50, 0.30, 0.18];

  function getSourceHex(){
    if (state.source === "custom"){
      const hex = seedInput.value.trim();
      return /^#[0-9a-fA-F]{6}$/.test(hex) ? hex : null;
    }
    return sourceHexes[state.source];
  }

  function computeAnchorSlot(){
    const hex = getSourceHex();
    if (!hex) return -1;
    const { l } = hexToHsl(hex);
    let best = 0, minDist = Infinity;
    EXT5_TARGETS.forEach((t, i) => {
      const d = Math.abs(t - l);
      if (d < minDist){ minDist = d; best = i; }
    });
    return best;
  }

  function computeColors(){
    if (state.source === "uswds"){
      const extDef = EXT_RAMP_DEFAULTS[idx];
      if (state.family === "CivicPress Default" && extDef) return [...extDef.colors];
      const fam = uswdsFamilySelect.value;
      return EXT_STEPS.map(s => lookupStep(fam, s));
    }
    if (state.source === "custom"){
      if (state.generateRamp) {
        const hex = seedInput.value.trim();
        return /^#[0-9a-fA-F]{6}$/.test(hex) ? ramp5(hex, 0) : null;
      }
      // No generate ramp: return current swatch colors as-is
      const cur = currentSystem.extended[idx];
      return (cur && cur.length) ? [...cur] : null;
    }
    return ramp5(sourceHexes[state.source], state.shift);
  }

  function getSwatchConfigs(){
    if (state.source === "uswds"){
      if (state.family === "CivicPress Default" && EXT_RAMP_DEFAULTS[idx]) return EXT_RAMP_DEFAULTS[idx].cfgs;
      const fam = uswdsFamilySelect.value;
      return EXT_STEPS.map(s => ({ family: fam, step: s }));
    }
    return null;
  }

  const rampContainer = document.createElement("div");
  card.appendChild(rampContainer);

  function applyRamp(colors, anchorSlot){
    currentSystem.extended[idx] = colors;
    rampContainer.innerHTML = "";
    const newRow = row(colors, extLabels, anchorSlot,
      (i, val) => {
        currentSystem.extended[idx][i] = val;
        // Show Reset Ramp only when there's a canonical ramp to reset to:
        // hue-shift sources always have one; custom only when generateRamp is on
        const hasCanonical = state.source !== "uswds" &&
          (state.source !== "custom" || state.generateRamp);
        if (hasCanonical) resetRampBtn.style.display = "";
      },
      getSwatchConfigs(),
      colors.map((_, i) => `extended${idx}:${i}`));
    rampContainer.appendChild(newRow);
  }

  resetRampBtn.addEventListener("click", () => {
    resetRampBtn.style.display = "none";
    updateRamp();
    scheduleURLUpdate();
  });

  const extKey = `extended${idx}`;
  const preExtColors = _preloadedKeys.has(extKey) ? currentSystem.extended[idx] : null;
  if (preExtColors) _preloadedKeys.delete(extKey);
  const initialColors = (preExtColors && preExtColors.length)
    ? preExtColors
    : (computeColors() || ramp5(sourceHexes.primary, 0));
  applyRamp(initialColors, state.source === "uswds" ? -1 : computeAnchorSlot());
  // Sync step-selects to preloaded colors
  if (preExtColors && preExtColors.length && state.source === "uswds") {
    rampContainer.querySelectorAll('.step-select').forEach((sel, i) => { if (preExtColors[i]) sel.value = preExtColors[i]; });
  }

  /* Expose reset — restores source, family, and swatches to section defaults */
  card._reset = () => {
    const def = EXT_SECTION_DEFAULTS[idx] || EXT_SECTION_DEFAULTS[0];
    Object.assign(state, { ...def });
    sourceSelect.value = state.source;
    uswdsFamilySelect.value = state.family || NON_GRAY_FAMILIES[0];
    genCheckbox.checked = !!state.generateRamp;
    seedWrap.style.display = state.generateRamp ? "inline-flex" : "none";
    const isUswds  = state.source === "uswds";
    const isCustom = state.source === "custom";
    const isShift  = !isUswds && !isCustom;
    uswdsFamilyWrap.style.display = isUswds  ? "inline-flex" : "none";
    shiftWrap.style.display       = isShift  ? "flex"        : "none";
    customWrap.style.display      = isCustom ? "flex"        : "none";
    hideResetRamp();
    updateRamp();
    swatchRegistry.forEach(fn => fn());
  };

  /* Live update */
  function updateRamp(){
    const colors = computeColors();
    if (!colors) return;
    applyRamp(colors, computeAnchorSlot());
  }

  function hideResetRamp() { resetRampBtn.style.display = "none"; }

  sourceSelect.addEventListener("change", () => {
    state.source = sourceSelect.value;
    const isUswds  = state.source === "uswds";
    const isCustom = state.source === "custom";
    const isShift  = !isUswds && !isCustom;
    uswdsFamilyWrap.style.display = isUswds  ? "inline-flex" : "none";
    shiftWrap.style.display       = isShift  ? "flex"        : "none";
    customWrap.style.display      = isCustom ? "flex"        : "none";
    if (isCustom) {
      // Preserve existing colors as hex swatches — don't regenerate
      state.generateRamp = false;
      genCheckbox.checked = false;
      seedWrap.style.display = "none";
      // Seed hex defaults to the current base slot (index 2 of 5) for potential generate ramp use
      const base = currentSystem.extended[idx] && currentSystem.extended[idx][2];
      if (base) { state.custom = base; seedInput.value = base; }
      hideResetRamp();
      // Re-render current colors as editable hex swatches
      const cur = currentSystem.extended[idx];
      if (cur && cur.length) applyRamp([...cur], -1);
      scheduleURLUpdate();
      return;
    }
    hideResetRamp();
    updateRamp();
    scheduleURLUpdate();
  });

  uswdsFamilySelect.addEventListener("change", () => {
    state.family = uswdsFamilySelect.value;
    hideResetRamp();
    updateRamp();
    scheduleURLUpdate();
  });

  shiftWrap.querySelector("input[type=range]").addEventListener("input", function(){
    state.shift = parseInt(this.value);
    shiftWrap.querySelector(".slider-value").innerText = state.shift + "°";
    hideResetRamp();
    updateRamp();
    scheduleURLUpdate();
  });

  // Generate Ramp checkbox — show/hide seed input and regenerate
  genCheckbox.addEventListener("change", () => {
    state.generateRamp = genCheckbox.checked;
    seedWrap.style.display = state.generateRamp ? "inline-flex" : "none";
    hideResetRamp();
    if (state.generateRamp) updateRamp();
    scheduleURLUpdate();
  });

  // Seed hex input for Generate Ramp
  bindColorPicker(seedInput);
  function syncSeedHex() {
    const v = seedInput.value.trim();
    if (/^#[0-9a-fA-F]{6}$/.test(v)) {
      state.custom = v;
      if (state.generateRamp) { hideResetRamp(); updateRamp(); }
      scheduleURLUpdate();
    }
  }
  seedInput.addEventListener("blur", syncSeedHex);
  seedInput.addEventListener("keydown", e => { if (e.key === "Enter") seedInput.blur(); });

  return card;
}

function getSectionBaseHex(key) {
  const st = sectionState[key];
  if (!st) return "#808080";
  if (st.mode === "custom") return st.customHex || "#808080";
  if (st.family === "CivicPress Default") {
    const def = SECTION_RAMP_DEFAULTS[key];
    return def ? def.colors[3] : "#808080"; // index 3 = Base slot
  }
  return lookupStep(st.family, 50);
}

function buildExtendedSection(sourceHexes){
  if (!document.getElementById("enableExtended").checked) return null;
  const count = parseInt(document.getElementById("extCount").value);

  // Always derive from sectionState so hue-shift uses the live primary/secondary/tertiary color
  const resolvedHexes = {
    primary:   getSectionBaseHex("primary"),
    secondary: getSectionBaseHex("secondary"),
    tertiary:  getSectionBaseHex("tertiary"),
  };

  const section = document.createElement("div");
  section.className = "group";

  const cards = [];
  for (let i = 1; i <= count; i++){
    const card = buildExtendedCard(i, resolvedHexes);
    cards.push(card);
  }

  section.appendChild(groupHeader("Extended Colors", () => {
    cards.forEach(card => card._reset && card._reset());
  }));

  cards.forEach(card => section.appendChild(card));
  return section;
}

/* ===========================
   SHARED: USWDS TOKEN LOOKUP
=========================== */

function findToken(hex) {
  if (!hex) return null;
  const h = hex.toLowerCase();
  for (const [family, data] of Object.entries(USWDS_COLORS)) {
    for (const [step, val] of Object.entries(data)) {
      if (val.toLowerCase() === h) return uswdsTokenName(family, Number(step));
    }
  }
  return null;
}

/* ===========================
   EXPORT THEME.JSON
=========================== */

function exportThemeJSON() {
  /* Return a theme.json color value — token ref if USWDS match found, else hex */
  function colorValue(hex, isUswdsMode) {
    if (isUswdsMode) {
      const token = findToken(hex);
      if (token) return `var(--token--color--${token})`;
    }
    return hex || '#000000';
  }

  const palette = [];

  /* --- Primary (7) --- */
  const primSlugs = ["primary-lightest","primary-lighter","primary-light","primary","primary-dark","primary-darker","primary-darkest"];
  const primNames = ["Primary Lightest","Primary Lighter","Primary Light","Primary","Primary Dark","Primary Darker","Primary Darkest"];
  const primUswds = sectionState.primary.mode === "uswds";
  (currentSystem.primary || []).forEach((c, i) => palette.push({ slug: primSlugs[i], color: colorValue(c, primUswds), name: primNames[i] }));

  /* --- Secondary (7) --- */
  const secSlugs = ["secondary-lightest","secondary-lighter","secondary-light","secondary","secondary-dark","secondary-darker","secondary-darkest"];
  const secNames = ["Secondary Lightest","Secondary Lighter","Secondary Light","Secondary","Secondary Dark","Secondary Darker","Secondary Darkest"];
  const secUswds = sectionState.secondary.mode === "uswds";
  (currentSystem.secondary || []).forEach((c, i) => palette.push({ slug: secSlugs[i], color: colorValue(c, secUswds), name: secNames[i] }));

  /* --- Tertiary (7) --- */
  const terSlugs = ["tertiary-lightest","tertiary-lighter","tertiary-light","tertiary","tertiary-dark","tertiary-darker","tertiary-darkest"];
  const terNames = ["Tertiary Lightest","Tertiary Lighter","Tertiary Light","Tertiary","Tertiary Dark","Tertiary Darker","Tertiary Darkest"];
  const terUswds = sectionState.tertiary.mode === "uswds";
  (currentSystem.tertiary || []).forEach((c, i) => palette.push({ slug: terSlugs[i], color: colorValue(c, terUswds), name: terNames[i] }));

  /* --- Extended palettes --- */
  if (document.getElementById("enableExtended").checked) {
    const count = parseInt(document.getElementById("extCount").value);
    for (let n = 1; n <= count; n++) {
      const idx = n - 1;
      const colors  = currentSystem.extended[idx] || [];
      const isUswds = extState[idx].source === "uswds";
      const extSlugs = ["lightest","light","","dark","darkest"].map(s => s ? `extended-${n}-${s}` : `extended-${n}`);
      const extNames = TONE_NAMES_5.map(t => t === "Base" ? `Extended Palette ${n}` : `Extended Palette ${n} ${t}`);
      colors.forEach((c, i) => palette.push({ slug: extSlugs[i], color: colorValue(c, isUswds), name: extNames[i] }));
    }
  }

  /* --- Semantic colors --- */
  const sem     = currentSystem.semantic || {};
  const semUswds = sectionState.semantic.mode === "uswds";
  palette.push({ slug: "background", color: colorValue(sem.background, semUswds), name: "Background" });
  palette.push({ slug: "foreground", color: colorValue(sem.foreground,  semUswds), name: "Foreground" });
  palette.push({ slug: "reverse",    color: colorValue(sem.reverse,     semUswds), name: "Reverse (On Color/Image)" });

  /* --- Base grays (7) — slugs reverse in dark mode, names describe visual lightness --- */
  const graySlugsLight = ["base-minus-3","base-minus-2","base-minus-1","base","base-plus-1","base-plus-2","base-plus-3"];
  const grayNamesAll   = ["Base Lightest","Base Lighter","Base Light","Base","Base Dark","Base Darker","Base Darkest"];
  const graySlugs = darkMode ? [...graySlugsLight].reverse() : graySlugsLight;
  const grayUswds = sectionState.gray.mode === "uswds";
  (currentSystem.grays || []).forEach((c, i) => palette.push({ slug: graySlugs[i], color: colorValue(c, grayUswds), name: grayNamesAll[i] }));

  /* --- Translucent variants (always custom rgba — never USWDS tokens) --- */
  const sem2 = currentSystem.semantic || {};
  palette.push({ slug: "translucent",                color: sem2.translucent              || TRANSLUCENT_DEFAULTS.translucent,              name: "Translucent" });
  palette.push({ slug: "translucent-subtle",         color: sem2.translucentSubtle        || TRANSLUCENT_DEFAULTS.translucentSubtle,        name: "Translucent Subtle" });
  palette.push({ slug: "translucent-reverse",        color: sem2.translucentReverse       || TRANSLUCENT_DEFAULTS.translucentReverse,       name: "Translucent Reverse" });
  palette.push({ slug: "translucent-reverse-subtle", color: sem2.translucentReverseSubtle || TRANSLUCENT_DEFAULTS.translucentReverseSubtle, name: "Translucent Reverse Subtle" });

  const themeJson = {
    "$schema": "https://schemas.wp.org/trunk/theme.json",
    "version": 3,
    "settings": {
      "color": {
        "custom": false,
        "customDuotone": false,
        "customGradient": false,
        "defaultDuotone": false,
        "defaultPalette": false,
        "defaultGradients": false,
        "palette": palette,
        "duotone": [],
        "gradients": []
      }
    }
  };

  const blob = new Blob([JSON.stringify(themeJson, null, "\t")], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "theme.json";
  a.click();
}

/* ===========================
   EXPORT CSS
=========================== */

function exportCSS(){
  const lines = [":root {"];
  const t7 = ["lightest","lighter","light","base","dark","darker","darkest"];
  const t5 = ["lightest","light","base","dark","darkest"];

  function addVars(prefix, arr, names){
    if (!arr || !arr.length) return;
    arr.forEach((color, i) => {
      const suffix = names[i] === "base" ? "" : `-${names[i]}`;
      lines.push(`  --${prefix}${suffix}: ${color};`);
    });
  }

  lines.push("\n  /* Primary */");
  addVars("color-primary", currentSystem.primary, t7);

  lines.push("\n  /* Secondary */");
  addVars("color-secondary", currentSystem.secondary, t7);

  lines.push("\n  /* Tertiary */");
  addVars("color-tertiary", currentSystem.tertiary, t7);

  lines.push("\n  /* Extended */");
  currentSystem.extended.forEach((colors, i) => {
    if (colors && colors.length){
      lines.push(`\n  /* Extended Palette ${i + 1} */`);
      addVars(`color-extended-${i + 1}`, colors, t5);
    }
  });

  lines.push("\n  /* Semantic */");
  lines.push(`  --color-background: ${currentSystem.semantic.background};`);
  lines.push(`  --color-foreground: ${currentSystem.semantic.foreground};`);
  lines.push(`  --color-reverse:    ${currentSystem.semantic.reverse};`);

  lines.push("\n  /* Grays */");
  const graySlugsLight = ["base-minus-3","base-minus-2","base-minus-1","base","base-plus-1","base-plus-2","base-plus-3"];
  const graySlugs = darkMode ? [...graySlugsLight].reverse() : graySlugsLight;
  currentSystem.grays.forEach((color, i) => {
    lines.push(`  --color-${graySlugs[i]}: ${color};`);
  });

  lines.push("}");

  const blob = new Blob([lines.join("\n")], { type: "text/css" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "color-system.css";
  a.click();
}

/* ===========================
   EXPORT SVG FOR FIGMA

   Layout (all units in px):
   - Each swatch:        100 × 100, corner radius 8
   - Swatch gap:         12
   - Section label row:  20px tall, above each row of swatches
   - Group title row:    28px tall, above each section
   - Group padding:      20px (top/bottom), 20px (left/right)
   - Group gap:          24px between groups
   - Total canvas width: auto-fit to widest group + margins
   - Font:               system-ui / Arial

   Figma treats every <rect> as an individually selectable frame
   and every <text> as editable — so once imported you get a
   real layer per swatch, named by its token label.
=========================== */

/* T-values derived from USWDS gray-5→gray-80 distribution (non-linear, perceptually weighted) */
const GRAY_T = [0, 0.201, 0.345, 0.634, 0.763, 0.881, 1.0];

function rampFromBgFg(bgHex, fgHex) {
  const bg = hexToRgb(bgHex);
  const fg = hexToRgb(fgHex);
  return GRAY_T.map(t => {
    const r = Math.round(bg.r + (fg.r - bg.r) * t);
    const g = Math.round(bg.g + (fg.g - bg.g) * t);
    const b = Math.round(bg.b + (fg.b - bg.b) * t);
    return "#" + [r, g, b].map(v => v.toString(16).padStart(2, "0")).join("");
  });
}

function hexToRgb(hex) {
  return {
    r: parseInt(hex.substr(1,2),16),
    g: parseInt(hex.substr(3,2),16),
    b: parseInt(hex.substr(5,2),16)
  };
}

const TRANSLUCENT_DEFAULTS = {
  translucent:               "rgba(0,0,0,0.6)",
  translucentSubtle:         "rgba(0,0,0,0.05)",
  translucentReverse:        "rgba(255,255,255,0.75)",
  translucentReverseSubtle:  "rgba(255,255,255,0.15)",
};

function isValidColor(val) {
  if (/^#[0-9a-fA-F]{6}([0-9a-fA-F]{2})?$/i.test(val)) return true;
  if (/^rgba?\(\s*\d{1,3}\s*,\s*\d{1,3}\s*,\s*\d{1,3}\s*(,\s*[\d.]+\s*)?\)$/i.test(val)) return true;
  return false;
}

/* ===========================
   WCAG CONTRAST
=========================== */

function relativeLuminance(hex) {
  const { r, g, b } = hexToRgb(hex);
  return [r, g, b].reduce((sum, c, i) => {
    const s = c / 255;
    const lin = s <= 0.03928 ? s / 12.92 : Math.pow((s + 0.055) / 1.055, 2.4);
    return sum + lin * [0.2126, 0.7152, 0.0722][i];
  }, 0);
}

function contrastRatio(hex1, hex2) {
  if (!/^#[0-9a-fA-F]{6}$/i.test(hex1) || !/^#[0-9a-fA-F]{6}$/i.test(hex2)) return 1;
  const l1 = relativeLuminance(hex1), l2 = relativeLuminance(hex2);
  return (Math.max(l1, l2) + 0.05) / (Math.min(l1, l2) + 0.05);
}

/* Registry of badge-refresh functions — one per live swatch */
let swatchRegistry = [];

function applyTheme() {
  const sem   = currentSystem.semantic || {};
  const grays = currentSystem.grays    || [];
  const prim  = currentSystem.primary  || [];
  const sec   = currentSystem.secondary|| [];

  // In dark mode the gray slug mapping is reversed, so "base-minus-3" = darkest physical color
  const gi = i => grays[darkMode ? (6 - i) : i] || "#808080";

  const vars = {
    '--color-background':    sem.background   || '#fafafa',
    '--color-foreground':    sem.foreground   || '#1f2020',
    '--color-reverse':       sem.reverse      || '#ffffff',
    '--color-base-minus-3':  gi(0),
    '--color-base-minus-2':  gi(1),
    '--color-base-minus-1':  gi(2),
    '--color-base':          gi(3),
    '--color-base-plus-1':   gi(4),
    '--color-base-plus-2':   gi(5),
    '--color-base-plus-3':   gi(6),
    '--color-primary':       prim[3] || '#0050d8',
    '--color-primary-light': prim[2] || '#73b3e7',
    '--color-primary-dark':  prim[4] || '#1a4480',
    '--color-font-confirm':  darkMode ? (prim[2] || '#73b3e7') : (prim[4] || '#1a4480'),
    '--color-secondary':     sec[3]  || '#d83933',
    '--color-secondary-dark':sec[4]  || '#b50909',
    // Interactive UI color swaps with its reverse in dark mode
    '--color-interactive':       darkMode ? resolveUtil('interactiveReverse')      : resolveUtil('interactive'),
    '--color-interactive-hover': darkMode ? resolveUtil('interactiveReverseHover') : resolveUtil('interactiveHover'),
    '--color-interactive-text':  labelColor(darkMode ? resolveUtil('interactiveReverse') : resolveUtil('interactive')),
    // UI border — live token from utilities
    '--color-ui-border': resolveUtil('uiBorder'),
    // Secondary UI color uses secondary-light in dark mode
    '--color-secondary-ui':      darkMode ? (sec[2] || '#7B61FF') : (sec[3] || '#7B61FF'),
    '--color-secondary-ui-hover':darkMode ? (sec[1] || '#6146e0') : (sec[4] || '#6146e0'),
    '--color-secondary-ui-text': labelColor(darkMode ? (sec[2] || '#7B61FF') : (sec[3] || '#7B61FF')),
    '--label-bg':     darkMode ? 'rgba(0,0,0,0.6)'                        : 'rgba(255,255,255,0.75)',
    '--shadow-group': darkMode ? '0 2px 10px rgba(255,255,255,0.07)'     : '0 2px 10px rgba(0,0,0,0.08)',
    '--shadow-swatch':darkMode ? '0 2px 6px rgba(255,255,255,0.1)'       : '0 2px 6px rgba(0,0,0,0.12)',
  };

  const styleEl = document.getElementById('theme-vars');
  if (styleEl) {
    styleEl.textContent = ':root{\n' +
      Object.entries(vars).map(([k,v]) => `  ${k}:${v};`).join('\n') +
      '\n}';
  }
  // Refresh typography preview whenever color system changes
  if (typeof typoBuilt !== 'undefined' && typoBuilt) updateTypePreview();
  if (typeof utilitiesBuilt !== 'undefined' && utilitiesBuilt) updateUtilitiesPreview();
  scheduleURLUpdate();
}

/* Pick black or white label text based on relative luminance */
function labelColor(hex) {
  const { r, g, b } = hexToRgb(hex);
  const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
  return lum > 0.55 ? "#1f2020" : "#ffffff";
}

function exportFigmaSVG() {
  const SW  = 100, SH = 100, GAP = 12, R = 8, PAD = 20;
  const GROUP_GAP = 24, TITLE_H = 28, SECTION_H = 20;

  const sem        = currentSystem.semantic || {};
  const pageBg     = (darkMode ? currentSystem.grays?.[6] : currentSystem.grays?.[0]) || '#f5f5f5';
  const sectionBg  = sem.background || '#ffffff';
  const fgColor    = sem.foreground  || '#1f2020';
  const labelFill  = darkMode ? 'black' : 'white';
  const labelAlpha = darkMode ? '0.75'  : '0.85';
  const labelTc    = darkMode ? '#ffffff' : '#1f2020';

  /* Display value: USWDS token name if found, else hex/rgba string */
  function colorLabel(color) {
    if (!color) return '';
    const token = findToken(color);
    if (token) return token;
    if (/^rgba?/i.test(color)) return color;
    return color.toUpperCase();
  }

  /* AA/AAA badges for a swatch color */
  function badges(color) {
    const result = [];
    for (const semHex of [sem.foreground || '#1f2020', sem.background || '#fafafa']) {
      const ratio = contrastRatio(color, semHex);
      const level = ratio >= 7 ? 'AAA' : ratio >= 4.5 ? 'AA' : null;
      if (level) result.push({ text: level, fill: semHex });
    }
    return result;
  }

  /* Section data */
  const mkBase = name => TONE_NAMES_7.map(t => t === "Base" ? name : `${name} ${t}`);
  const mkExt  = n    => TONE_NAMES_5.map(t => t === "Base" ? `Extended Palette ${n}` : `Extended Palette ${n} ${t}`);
  const graySlugsLight = ["base-minus-3","base-minus-2","base-minus-1","base","base-plus-1","base-plus-2","base-plus-3"];
  const graySlugs = darkMode ? [...graySlugsLight].reverse() : graySlugsLight;

  const extSections = currentSystem.extended
    .map((colors, i) => ({ title: `Extended Palette ${i+1}`, rows: [{ label:"", colors, names: mkExt(i+1),
      brandKeys: colors.map((_, j) => `extended${i}:${j}`) }] }))
    .filter(s => s.rows[0].colors?.length);

  const anchorSlots = currentSystem.anchorSlots || {};
  const sections = [
    { title:"Primary Colors",   rows:[{ label:"", colors:currentSystem.primary,   names:mkBase("Primary"),
        brandKeys: (currentSystem.primary||[]).map((_, i) => `primary:${i}`),
        anchorSlot: anchorSlots['primary'] ?? -1 }] },
    { title:"Secondary Colors", rows:[{ label:"", colors:currentSystem.secondary, names:mkBase("Secondary"),
        brandKeys: (currentSystem.secondary||[]).map((_, i) => `secondary:${i}`),
        anchorSlot: anchorSlots['secondary'] ?? -1 }] },
    { title:"Tertiary Colors",  rows:[{ label:"", colors:currentSystem.tertiary,  names:mkBase("Tertiary"),
        brandKeys: (currentSystem.tertiary||[]).map((_, i) => `tertiary:${i}`),
        anchorSlot: anchorSlots['tertiary'] ?? -1 }] },
    ...extSections,
    { title:"Semantic Colors", rows:[
      { label:"", colors:[sem.background, sem.foreground, sem.reverse], names:["Background","Foreground","Reverse"],
        brandKeys: ["semantic:background","semantic:foreground","semantic:reverse"], anchorSlot: -1 },
      { label:"Translucent", colors:[sem.translucent, sem.translucentSubtle, sem.translucentReverse, sem.translucentReverseSubtle],
        names:["Translucent","Translucent Subtle","Translucent Reverse","Translucent Reverse Subtle"],
        brandKeys: ["semantic:translucent","semantic:translucentSubtle","semantic:translucentReverse","semantic:translucentReverseSubtle"],
        anchorSlot: -1 }
    ]},
    { title:"Base Grays", rows:[{ label:"", colors:currentSystem.grays, names:TONE_NAMES_7.map(t=>t==="Base"?"Base":`Base ${t}`),
        brandKeys: (currentSystem.grays||[]).map((_, i) => `gray:${i}`),
        anchorSlot: anchorSlots['grays'] ?? -1 }] }
  ];

  const maxSwatches = Math.max(...sections.flatMap(s => s.rows.map(r => (r.colors||[]).length)));
  const canvasW = PAD*2 + maxSwatches*(SW+GAP) - GAP;

  const elems = [];
  let y = PAD;

  sections.forEach(section => {
    const groupStartY = y;

    elems.push(`<text x="${PAD}" y="${y+18}" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="${fgColor}">${escXML(section.title)}</text>`);
    y += TITLE_H;

    section.rows.forEach(rowDef => {
      if (rowDef.label) {
        elems.push(`<text x="${PAD}" y="${y+13}" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="${fgColor}" opacity="0.6">${escXML(rowDef.label)}</text>`);
        y += SECTION_H;
      }

      (rowDef.colors || []).forEach((color, i) => {
        if (!color) return;
        const x   = PAD + i*(SW+GAP);
        const name = escXML(rowDef.names?.[i] || '');
        const val  = escXML(colorLabel(color));
        const bs   = badges(color);

        /* Swatch */
        elems.push(`<rect id="${name}" x="${x}" y="${y}" width="${SW}" height="${SH}" rx="${R}" ry="${R}" fill="${color}" />`);

        /* Label background strip */
        elems.push(`<rect x="${x}" y="${y+SH-30}" width="${SW}" height="30" fill="${labelFill}" fill-opacity="${labelAlpha}" />`);

        /* Swatch name */
        elems.push(`<text x="${x+4}" y="${y+SH-17}" font-family="Arial,sans-serif" font-size="7.5" font-weight="bold" fill="${labelTc}">${name}</text>`);

        /* Color value (token or hex) */
        elems.push(`<text x="${x+4}" y="${y+SH-6}" font-family="Arial,sans-serif" font-size="7.5" fill="${labelTc}" opacity="0.8">${val}</text>`);

        /* AA/AAA contrast badges */
        bs.forEach((b, bi) => {
          elems.push(`<text x="${x+4}" y="${y+11+bi*10}" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="${b.fill}">${b.text}</text>`);
        });

        /* Brand color asterisk */
        if (rowDef.brandKeys && brandColors.has(rowDef.brandKeys[i])) {
          const starFill = labelColor(color);
          elems.push(`<text x="${x+SW-10}" y="${y+15}" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="${starFill}">*</text>`);
        }

        /* INPUT badge — shown on the swatch that matches the custom seed hex */
        if (rowDef.anchorSlot === i) {
          const badgeBg = labelColor(color);
          const badgeTc = color;
          elems.push(`<rect x="${x+SW-44}" y="${y+4}" width="40" height="14" rx="3" ry="3" fill="${badgeBg}" />`);
          elems.push(`<text x="${x+SW-24}" y="${y+14}" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="${badgeTc}" text-anchor="middle">INPUT</text>`);
        }
      });

      y += SH + GAP;
    });

    /* Section background — unshift so it renders behind content */
    const groupH = y - groupStartY + PAD/2;
    elems.unshift(`<rect x="4" y="${groupStartY-8}" width="${canvasW-8}" height="${groupH}" rx="10" ry="10" fill="${sectionBg}" />`);

    y += GROUP_GAP;
  });

  const totalH = y + PAD;
  const svg = [
    `<svg xmlns="http://www.w3.org/2000/svg" width="${canvasW}" height="${totalH}" viewBox="0 0 ${canvasW} ${totalH}">`,
    `  <rect width="${canvasW}" height="${totalH}" fill="${pageBg}" />`,
    ...elems.map(e => "  " + e),
    `</svg>`
  ].join('\n');

  const blob = new Blob([svg], { type:"image/svg+xml" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "color-system.svg";
  a.click();
}

function escXML(str) {
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

/* ===========================
   SEMANTIC GROUP
=========================== */

function buildSemanticGroup() {
  const state = sectionState.semantic;
  const ALL_FAMILIES = GRAY_FAMILIES;
  const g = document.createElement("div");
  g.className = "group";

  const rampArea = document.createElement("div");
  let lastSwatches = [];

  const CORE_ROLES = [
    { label: "Background", key: "background", lightOrDark: darkMode ? "dark"  : "light" },
    { label: "Foreground", key: "foreground",  lightOrDark: darkMode ? "light" : "dark"  },
    { label: "Reverse",    key: "reverse",     fixedStep: 0                              },
  ];
  const TRANSLUCENT_ROLES = [
    { label: "Translucent",                key: "translucent",              rgba: true, defaultValue: TRANSLUCENT_DEFAULTS.translucent              },
    { label: "Translucent Subtle",         key: "translucentSubtle",        rgba: true, defaultValue: TRANSLUCENT_DEFAULTS.translucentSubtle         },
    { label: "Translucent Reverse",        key: "translucentReverse",       rgba: true, defaultValue: TRANSLUCENT_DEFAULTS.translucentReverse        },
    { label: "Translucent Reverse Subtle", key: "translucentReverseSubtle", rgba: true, defaultValue: TRANSLUCENT_DEFAULTS.translucentReverseSubtle  },
  ];
  const SEMANTIC_ROLES = [...CORE_ROLES, ...TRANSLUCENT_ROLES];

  function stepsForFamily(fam) {
    const data = USWDS_COLORS[fam] || {};
    return Object.keys(data).map(Number).sort((a,b)=>a-b).filter(s=>s>=0);
  }

  function buildRamp() {
    rampArea.innerHTML = "";

    /* --- Core row: Background, Foreground, Reverse --- */
    const coreRow = document.createElement("div");
    coreRow.className = "row";

    CORE_ROLES.forEach(({ label, key, lightOrDark, fixedStep }) => {
      let color, cfg = null;
      if (state.mode === "uswds") {
        const fam   = state.family;
        const steps = stepsForFamily(fam);
        const step  = fixedStep !== undefined
          ? fixedStep
          : (lightOrDark === "light" ? steps[1] : steps[steps.length - 1]);
        color = lookupStep(fam, step);
        cfg   = { family: fam, step };
      } else {
        color = currentSystem.semantic[key] ||
          (fixedStep === 0 ? "#ffffff" : lightOrDark === "light" ? "#FAFAFA" : "#1F2020");
      }
      currentSystem.semantic[key] = color;
      coreRow.appendChild(swatch(color, label, false,
        val => { currentSystem.semantic[key] = val; swatchRegistry.forEach(fn => fn()); }, cfg,
        `semantic:${key}`));
    });
    rampArea.appendChild(coreRow);

    /* --- Translucent row --- */
    rampArea.appendChild(subtitle("Translucent"));
    const transRow = document.createElement("div");
    transRow.className = "row";

    TRANSLUCENT_ROLES.forEach(({ label, key, defaultValue }) => {
      const color = currentSystem.semantic[key] || defaultValue;
      currentSystem.semantic[key] = color;
      transRow.appendChild(swatch(color, label, false,
        val => { currentSystem.semantic[key] = val; swatchRegistry.forEach(fn => fn()); },
        null, `semantic:${key}`)); // always hex/rgba input — never USWDS
    });
    rampArea.appendChild(transRow);

    lastSwatches = Array.from(rampArea.querySelectorAll(".swatch"));
  }

  function resetSemantic() {
    Object.assign(currentSystem.semantic, { ...TRANSLUCENT_DEFAULTS });
    const def = SECTION_DEFAULTS.semantic;
    Object.assign(state, { ...def });
    modeSelect.value = state.mode;
    familySelect.value = state.family;
    familyWrap.style.display = state.mode === "uswds" ? "" : "none";
    buildRamp();
  }

  g.appendChild(groupHeader("Semantic Colors", resetSemantic));

  /* Source UI — all families available for semantic colors */
  const sourceUI = document.createElement("div");
  sourceUI.className = "color-source-ui";

  const modeSelect = document.createElement("select");
  modeSelect.innerHTML = '<option value="uswds">USWDS</option><option value="custom">Custom</option>';
  modeSelect.value = state.mode;

  const familyWrap = document.createElement("span");
  const familySelect = document.createElement("select");
  ALL_FAMILIES.forEach(f => {
    const o = document.createElement("option");
    o.value = f; o.textContent = f;
    familySelect.appendChild(o);
  });
  if (!ALL_FAMILIES.includes(state.family)) state.family = "Gray";
  familySelect.value = state.family;
  familyWrap.appendChild(familySelect);
  familyWrap.style.display = state.mode === "uswds" ? "" : "none";

  modeSelect.addEventListener("change", () => {
    state.mode = modeSelect.value;
    familyWrap.style.display = state.mode === "uswds" ? "" : "none";
    buildRamp();
    scheduleURLUpdate();
  });
  familySelect.addEventListener("change", () => { state.family = familySelect.value; buildRamp(); scheduleURLUpdate(); });

  sourceUI.appendChild(modeSelect);
  sourceUI.appendChild(familyWrap);
  g.appendChild(sourceUI);
  g.appendChild(rampArea);
  buildRamp();
  return g;
}

/* ===========================
   GRAY GROUP
=========================== */

function buildGrayGroup() {
  const state = sectionState.gray;
  const g = document.createElement("div");
  g.className = "group";

  const rampArea = document.createElement("div");
  let lastColors = [], lastRampRow = null;
  const grayLabels = TONE_NAMES_7.map(t => t === "Base" ? "Base" : `Base ${t}`);

  function buildRamp() {
    rampArea.innerHTML = "";
    let colors, cfgs = null, grayAnchorSlot = -1;

    if (state.mode === "uswds") {
      colors = GRAY_STEPS.map(s => lookupStep(state.family, s));
      cfgs   = GRAY_STEPS.map(s => ({ family: state.family, step: s }));
      if (!currentSystem.anchorSlots) currentSystem.anchorSlots = {};
      delete currentSystem.anchorSlots['grays'];
      // Apply preloaded per-swatch colors (from URL) only on initial page load — consumed once
      if (_preloadedKeys.has('grays')) {
        const preColors = currentSystem.grays;
        if (preColors && preColors.length === colors.length) colors = [...preColors];
        _preloadedKeys.delete('grays');
      }
    } else {
      const { colors: c, anchorSlot } = ramp7Smart(state.customHex || "#757575");
      grayAnchorSlot = anchorSlot;
      if (!currentSystem.anchorSlots) currentSystem.anchorSlots = {};
      currentSystem.anchorSlots['grays'] = anchorSlot;
      // Consume preloaded URL colors once; otherwise preserve any user-edited values so dark
      // mode toggles and other rebuilds do not wipe manual swatch changes.
      if (_preloadedKeys.has('grays')) {
        const preColors = currentSystem.grays;
        colors = (preColors && preColors.length === c.length) ? [...preColors] : c;
        _preloadedKeys.delete('grays');
      } else {
        colors = (currentSystem.grays && currentSystem.grays.length === c.length)
          ? [...currentSystem.grays]
          : c;
      }
      if (state.generateRamp) rampArea.appendChild(anchorInfo(anchorSlot, state.customHex || "#757575"));
    }

    lastColors = colors;
    currentSystem.grays = [...colors];
    rampArea.appendChild(subtitle("Color Ramp"));
    lastRampRow = row(colors, grayLabels, grayAnchorSlot, (i, val) => { currentSystem.grays[i] = val; }, cfgs,
      colors.map((_, i) => `gray:${i}`));
    if (cfgs) lastRampRow.querySelectorAll('.step-select').forEach((sel, i) => { if (colors[i]) sel.value = colors[i]; });
    rampArea.appendChild(lastRampRow);
    applyTheme();
  }

  const { element: graySourceEl, reset: resetGray } = buildColorSourceUI("gray", GRAY_FAMILIES, buildRamp);
  g.appendChild(groupHeader("Base Grays", resetGray));
  g.appendChild(graySourceEl);
  g.appendChild(rampArea);
  buildRamp();
  return g;
}

/* ===========================
   GENERATE
=========================== */

function generate(){
  const preload = _preload;
  _preload = null;

  // Track which keys have preloaded colors so buildRamp consumes them only once
  _preloadedKeys = new Set();
  if (preload?.primary?.length)   _preloadedKeys.add('primary');
  if (preload?.secondary?.length) _preloadedKeys.add('secondary');
  if (preload?.tertiary?.length)  _preloadedKeys.add('tertiary');
  if (preload?.grays?.length)     _preloadedKeys.add('grays');
  if (preload?.extended) {
    preload.extended.forEach((c, i) => { if (c?.length) _preloadedKeys.add(`extended${i}`); });
  }

  swatchRegistry = [];
  const out = document.getElementById("output");
  out.innerHTML = "";

  currentSystem = {
    primary:   preload?.primary   || [],
    secondary: preload?.secondary || [],
    tertiary:  preload?.tertiary  || [],
    extended:  preload?.extended  || [[], [], []],
    grays:     preload?.grays     || [],
    semantic: { background: "#FAFAFA", foreground: "#1F2020", reverse: "#FFFFFF",
                ...TRANSLUCENT_DEFAULTS, ...(preload?.semantic || {}) },
    anchorSlots: {}
  };

  const pGroup = group("Primary Colors",   "primary",   "Primary",   "primary");
  const sGroup = group("Secondary Colors", "secondary", "Secondary", "secondary");
  const tGroup = group("Tertiary Colors",  "tertiary",  "Tertiary",  "tertiary");

  out.appendChild(pGroup.element);
  out.appendChild(sGroup.element);
  out.appendChild(tGroup.element);

  currentExtSectionEl = buildExtendedSection({});
  if (currentExtSectionEl) out.appendChild(currentExtSectionEl);

  currentSemanticGroupEl = buildSemanticGroup();
  out.appendChild(currentSemanticGroupEl);

  currentGrayGroupEl = buildGrayGroup();
  out.appendChild(currentGrayGroupEl);

  // Refresh all contrast badges and apply page theme now that colors are finalised
  swatchRegistry.forEach(fn => fn());
  applyTheme();
}

function resetAll() {
  brandColors = new Set();
  const titleEl = document.getElementById("page-title");
  if (titleEl) titleEl.textContent = DEFAULT_TITLE;
  Object.keys(SECTION_DEFAULTS).forEach(k => {
    Object.assign(sectionState[k], JSON.parse(JSON.stringify(SECTION_DEFAULTS[k])));
  });
  EXT_SECTION_DEFAULTS.forEach((d, i) => {
    Object.assign(extState[i], JSON.parse(JSON.stringify(d)));
  });
  generate();
}

// Page title — click to edit, saves to URL
const pageTitleEl = document.getElementById("page-title");
const DEFAULT_TITLE = "CivicPress Token Generator";
pageTitleEl.addEventListener("input", () => scheduleURLUpdate());
pageTitleEl.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); pageTitleEl.blur(); } });
// Prevent pasting rich text
pageTitleEl.addEventListener("paste", e => {
  e.preventDefault();
  document.execCommand("insertText", false, e.clipboardData.getData("text/plain"));
});

document.getElementById("darkMode").addEventListener("change", function() {
  darkMode = this.checked;
  scheduleURLUpdate();

  if (currentSemanticGroupEl) {
    const newSem = buildSemanticGroup();
    currentSemanticGroupEl.replaceWith(newSem);
    currentSemanticGroupEl = newSem;
  }

  if (currentGrayGroupEl) {
    const newGray = buildGrayGroup();
    currentGrayGroupEl.replaceWith(newGray);
    currentGrayGroupEl = newGray;
  }

  swatchRegistry.forEach(fn => fn());
  applyTheme();
});

function rebuildExtSection() {
  const enabled = document.getElementById("enableExtended").checked;
  const newExt = enabled ? buildExtendedSection({}) : null;

  if (currentExtSectionEl) {
    if (newExt) {
      currentExtSectionEl.replaceWith(newExt);
    } else {
      currentExtSectionEl.remove();
    }
  } else if (newExt && currentSemanticGroupEl) {
    currentSemanticGroupEl.before(newExt);
  }
  currentExtSectionEl = newExt;
  swatchRegistry.forEach(fn => fn());
  applyTheme();
}

document.getElementById("enableExtended").addEventListener("change", function(){
  document.getElementById("extCountWrap").style.display = this.checked ? "" : "none";
  rebuildExtSection();
  scheduleURLUpdate();
});

document.getElementById("extCount").addEventListener("change", () => { rebuildExtSection(); scheduleURLUpdate(); });

/* ===========================
   URL STATE PERSISTENCE
=========================== */

function colorsEqual(a, b) {
  if (!a || !b || a.length !== b.length) return false;
  return a.every((v, i) => (v||'').toLowerCase() === (b[i]||'').toLowerCase());
}

function expectedColors(sectionKey) {
  const s = sectionState[sectionKey];
  if (s.mode !== 'uswds') return null;
  const def = SECTION_RAMP_DEFAULTS[sectionKey];
  if (s.family === 'CivicPress Default' && def) return def.colors;
  const steps = getMainSteps(s.family);
  return steps.map(st => lookupStep(s.family, st));
}

function encodeStateToURL() {
  const p = new URLSearchParams();
  const extEl  = document.getElementById("enableExtended");
  const extCEl = document.getElementById("extCount");

  if (darkMode) p.set('dm', '1');
  if (!extEl.checked) p.set('ext', '0');
  if (extCEl.value !== '3') p.set('extc', extCEl.value);

  const prefixes = { primary:'p', secondary:'s', tertiary:'t', gray:'gr', semantic:'sem' };
  for (const [key, px] of Object.entries(prefixes)) {
    const s   = sectionState[key];
    const def = SECTION_DEFAULTS[key] || {};
    if (s.mode !== def.mode) p.set(`${px}m`, s.mode);
    if (s.mode === 'uswds'  && s.family !== def.family) p.set(`${px}f`, s.family);
    if (s.mode === 'custom' && s.customHex) p.set(`${px}x`, s.customHex);
    if (s.mode === 'custom' && s.generateRamp !== undefined && !!s.generateRamp !== !!def.generateRamp)
      p.set(`${px}g`, s.generateRamp ? '1' : '0');
  }

  // Encode per-swatch colors whenever they differ from expected (captures individual overrides)
  const h = arr => (arr || []).filter(Boolean).map(c => c.replace('#','')).join(',');
  for (const [key, px] of [['primary','p'],['secondary','s'],['tertiary','t']]) {
    const colors = currentSystem[key] || [];
    if (colors.length && !colorsEqual(colors, expectedColors(key))) p.set(`${px}c`, h(colors));
  }
  // Gray colors: encode if they differ from the expected USWDS gray steps
  const grayColors = currentSystem.grays || [];
  const expGray = sectionState.gray.mode === 'uswds'
    ? GRAY_STEPS.map(s => lookupStep(sectionState.gray.family || 'Gray', s))
    : null;
  if (grayColors.length && !colorsEqual(grayColors, expGray)) p.set('grc', h(grayColors));

  // Semantic core colors only when in custom mode
  const sem = currentSystem.semantic || {};
  if (sectionState.semantic.mode === 'custom') {
    if (sem.background) p.set('sbg', sem.background.replace('#',''));
    if (sem.foreground) p.set('sfg', sem.foreground.replace('#',''));
    if (sem.reverse)    p.set('srv', sem.reverse.replace('#',''));
  }
  const td = TRANSLUCENT_DEFAULTS;
  if (sem.translucent              && sem.translucent              !== td.translucent)              p.set('str',  sem.translucent);
  if (sem.translucentSubtle        && sem.translucentSubtle        !== td.translucentSubtle)        p.set('strs', sem.translucentSubtle);
  if (sem.translucentReverse       && sem.translucentReverse       !== td.translucentReverse)       p.set('strr', sem.translucentReverse);
  if (sem.translucentReverseSubtle && sem.translucentReverseSubtle !== td.translucentReverseSubtle) p.set('strrs',sem.translucentReverseSubtle);

  if (extEl.checked) {
    const count = parseInt(extCEl.value);
    for (let i = 0; i < count; i++) {
      const e   = extState[i];
      const def = EXT_SECTION_DEFAULTS[i];
      if (e.source !== def.source) p.set(`e${i}s`, e.source);
      if (e.source === 'uswds'   && e.family !== def.family)  p.set(`e${i}f`, e.family);
      if (e.source !== 'uswds'   && e.source !== 'custom' && e.shift !== def.shift) p.set(`e${i}h`, String(e.shift));
      if (e.source === 'custom'  && e.custom) p.set(`e${i}x`, e.custom.replace('#',''));
      if (e.source === 'custom'  && e.generateRamp) p.set(`e${i}g`, '1');
      // Extended colors: encode if they differ from expected defaults
      const extColors = currentSystem.extended[i] || [];
      const expExt = (e.source === 'uswds' && e.family === 'CivicPress Default' && EXT_RAMP_DEFAULTS[i])
        ? EXT_RAMP_DEFAULTS[i].colors
        : (e.source === 'uswds' ? EXT_STEPS.map(s => lookupStep(e.family, s)) : null);
      if (extColors.length && !colorsEqual(extColors, expExt)) p.set(`e${i}c`, h(extColors));
    }
  }

  if (brandColors.size > 0) p.set('bc', [...brandColors].join(','));

  const titleText = (document.getElementById("page-title")?.textContent || "").trim();
  if (titleText && titleText !== DEFAULT_TITLE) p.set('ttl', titleText);

  return p.toString();
}

function applyStateFromURL() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (!location.hash) return;

  if (p.has('dm')) {
    darkMode = p.get('dm') === '1';
    document.getElementById("darkMode").checked = darkMode;
  }

  const extEl  = document.getElementById("enableExtended");
  const extCEl = document.getElementById("extCount");
  if (p.get('ext') === '0') {
    extEl.checked = false;
    document.getElementById("extCountWrap").style.display = "none";
  }
  if (p.has('extc')) extCEl.value = p.get('extc');

  const prefixes = { primary:'p', secondary:'s', tertiary:'t', gray:'gr', semantic:'sem' };
  for (const [key, px] of Object.entries(prefixes)) {
    const s = sectionState[key];
    if (p.has(`${px}m`)) s.mode = p.get(`${px}m`);
    if (p.has(`${px}f`)) s.family = p.get(`${px}f`);
    if (p.has(`${px}x`)) s.customHex = p.get(`${px}x`);
    if (p.has(`${px}g`)) s.generateRamp = p.get(`${px}g`) === '1';
  }

  const dec = str => str.split(',').map(c => '#' + c);
  const preload = {};
  if (p.has('pc'))  preload.primary   = dec(p.get('pc'));
  if (p.has('sc'))  preload.secondary = dec(p.get('sc'));
  if (p.has('tc'))  preload.tertiary  = dec(p.get('tc'));
  if (p.has('grc')) preload.grays     = dec(p.get('grc'));

  const sem = {};
  if (p.has('sbg'))  sem.background              = '#' + p.get('sbg');
  if (p.has('sfg'))  sem.foreground              = '#' + p.get('sfg');
  if (p.has('srv'))  sem.reverse                 = '#' + p.get('srv');
  if (p.has('str'))  sem.translucent             = p.get('str');
  if (p.has('strs')) sem.translucentSubtle        = p.get('strs');
  if (p.has('strr')) sem.translucentReverse       = p.get('strr');
  if (p.has('strrs'))sem.translucentReverseSubtle = p.get('strrs');
  if (Object.keys(sem).length) preload.semantic = sem;

  for (let i = 0; i < 3; i++) {
    if (p.has(`e${i}s`)) extState[i].source = p.get(`e${i}s`);
    if (p.has(`e${i}f`)) extState[i].family = p.get(`e${i}f`);
    if (p.has(`e${i}h`)) extState[i].shift  = parseInt(p.get(`e${i}h`));
    if (p.has(`e${i}x`)) extState[i].custom = '#' + p.get(`e${i}x`);
    if (p.has(`e${i}g`)) extState[i].generateRamp = p.get(`e${i}g`) === '1';
    if (p.has(`e${i}c`)) {
      if (!preload.extended) preload.extended = [[], [], []];
      preload.extended[i] = dec(p.get(`e${i}c`));
    }
  }

  _preload = preload;

  if (p.has('bc')) brandColors = new Set(p.get('bc').split(',').filter(Boolean));
  if (p.has('ttl')) {
    const el = document.getElementById("page-title");
    if (el) el.textContent = p.get('ttl');
  }
}

let _urlTimer = null;
function scheduleURLUpdate() {
  clearTimeout(_urlTimer);
  _urlTimer = setTimeout(() => {
    const qs = encodeStateToURL();
    history.replaceState(null, '', qs ? '#' + qs : location.pathname + location.search);
  }, 200);
}

function copyURL() {
  const qs = encodeStateToURL();
  const url = location.origin + location.pathname + (qs ? '#' + qs : '');
  history.replaceState(null, '', qs ? '#' + qs : location.pathname + location.search);
  navigator.clipboard.writeText(url).then(() => showTooltip("URL copied!"));
}
